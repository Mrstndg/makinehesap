/* ---- çizim ---- */
function sNodeHTML(n) {
  const t = S_TYPES[n.type];
  let ps = '';
  for (const p of t.params) {
    const val = (n.params[p.id] != null ? n.params[p.id] : '');
    ps += `<div class="s-p"><label>${p.label}</label><input data-p="${p.id}" ${p.t === 'text' ? 'type="text"' : 'type="text" inputmode="decimal"'} value="${String(val).replace(/"/g, '&quot;')}" /></div>`;
  }
  return `<div class="s-node ${sLinkSrc === n.id ? 'link-src' : ''}" data-id="${n.id}" style="left:${n.x}px; top:${n.y}px;">
    <div class="s-head" style="background:${t.color}"><span class="s-ico" id="sIco${n.id}">${t.ico}</span> ${t.name} <span class="s-x" title="Sil">✕</span></div>
    <div class="s-body">${ps}<div class="s-res" id="sRes${n.id}">— henüz hesaplanmadı</div></div>
  </div>`;
}
function sRenderAll() {
  const inner = document.getElementById('sInner');
  if (!inner) return;
  let h = `<svg id="sSvg"></svg>`;
  for (const n of sN) h += sNodeHTML(n);
  h += `<div class="s-edgemenu" id="sEdgeMenu"></div>`;
  inner.innerHTML = h;
  for (const n of sN) sBindNode(n);
  sDrawEdges();
}
function sBindNode(n) {
  const el = document.querySelector(`.s-node[data-id="${n.id}"]`);
  if (!el) return;
  el.querySelector('.s-x').addEventListener('click', (e) => { e.stopPropagation(); sDel(n.id); });
  el.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('pointerdown', (e) => e.stopPropagation());
    inp.addEventListener('input', () => { n.params[inp.dataset.p] = inp.value; sSave(); });
  });
  el.addEventListener('pointerdown', (ev) => {
    if (ev.target.tagName === 'INPUT' || ev.target.classList.contains('s-x')) return;
    if (sMode === 'link') { sLinkClick(n.id); return; }
    ev.preventDefault();
    const inner = document.getElementById('sInner');
    const rect = inner.getBoundingClientRect();
    const ox = ev.clientX - rect.left - n.x, oy = ev.clientY - rect.top - n.y;
    el.style.zIndex = 8;
    try { el.setPointerCapture(ev.pointerId); } catch (_) {}
    const move = (e2) => {
      n.x = Math.max(0, Math.min(1400, e2.clientX - rect.left - ox));
      n.y = Math.max(0, Math.min(860,  e2.clientY - rect.top  - oy));
      el.style.left = n.x + 'px'; el.style.top = n.y + 'px';
      sDrawEdges();
    };
    const up = () => {
      el.removeEventListener('pointermove', move);
      el.removeEventListener('pointerup', up);
      el.removeEventListener('pointercancel', up);
      el.style.zIndex = 5;
      sSave();
    };
    el.addEventListener('pointermove', move);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
  });
}
function sLinkClick(id) {
  if (sLinkSrc === null) { sLinkSrc = id; sRenderAll(); return; }
  if (sLinkSrc === id) { sLinkSrc = null; sRenderAll(); return; }
  const a = sN.find(n => n.id === sLinkSrc), b = sN.find(n => n.id === id);
  if (a && b && !sE.some(e => (e.from === a.id && e.to === b.id) || (e.from === b.id && e.to === a.id))) {
    sE.push({ from: a.id, to: b.id, kind: sDefaultKind(a, b) });
  }
  sLinkSrc = null; sSave(); sRenderAll();
}
function sDefaultKind(a, b) {
  const meshable = ['disli', 'kasnak', 'zincir', 'konik'];
  if (a.type === b.type && meshable.includes(a.type)) return 'mesh';
  if (a.type === 'sonsuz' && b.type === 'disli') return 'mesh';
  if (a.type === 'disli' && b.type === 'kremayer') return 'mesh';
  return 'shaft';
}
function sRectOf(id) {
  const el = document.querySelector(`.s-node[data-id="${id}"]`);
  if (!el) return null;
  return { cx: el.offsetLeft + el.offsetWidth / 2, cy: el.offsetTop + el.offsetHeight / 2, hw: el.offsetWidth / 2 + 8, hh: el.offsetHeight / 2 + 8 };
}
function sBorderPt(r, toward) {
  const dx = toward.cx - r.cx, dy = toward.cy - r.cy;
  const m = Math.max(Math.abs(dx) / r.hw, Math.abs(dy) / r.hh, 1e-9);
  const t = Math.min(1 / m, 1);
  return { x: r.cx + dx * t, y: r.cy + dy * t };
}
function sDrawEdges() {
  const svg = document.getElementById('sSvg');
  if (!svg) return;
  let h = `<defs>
    <marker id="sArrB" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2563eb"/></marker>
    <marker id="sArrG" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#94a3b8"/></marker>
  </defs>`;
  sE.forEach((e, i) => {
    const ra = sRectOf(e.from), rb = sRectOf(e.to);
    if (!ra || !rb) return;
    const p1 = sBorderPt(ra, rb), p2 = sBorderPt(rb, ra);
    const mesh = e.kind === 'mesh';
    const col = mesh ? '#2563eb' : '#94a3b8';
    h += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="${col}" stroke-width="2.4" ${mesh ? '' : 'stroke-dasharray="7 5"'} marker-end="url(#${mesh ? 'sArrB' : 'sArrG'})"/>`;
    const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
    h += `<text x="${mx}" y="${my - 8}" font-size="11" font-weight="700" fill="${col}" text-anchor="middle" paint-order="stroke" stroke="var(--card)" stroke-width="3">${mesh ? '⚙ kavrama' : '═ aynı mil'}</text>`;
    h += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="transparent" stroke-width="18" style="cursor:pointer" onclick="sEdgeClick(${i}, event)"/>`;
  });
  svg.innerHTML = h;
}
function sEdgeClick(i, ev) {
  ev.stopPropagation();
  sSelEdge = i;
  const e = sE[i];
  const ra = sRectOf(e.from), rb = sRectOf(e.to);
  if (!ra || !rb) return;
  const mx = (ra.cx + rb.cx) / 2, my = (ra.cy + rb.cy) / 2;
  const menu = document.getElementById('sEdgeMenu');
  menu.innerHTML = `
    <button onclick="sSetKind('mesh')">⚙ Kavrama</button>
    <button onclick="sSetKind('shaft')">═ Aynı mil</button>
    <button onclick="sReverseEdge()">⇄ Yön</button>
    <button onclick="sDelEdge()">🗑 Sil</button>`;
  menu.style.left = Math.max(0, mx - 110) + 'px';
  menu.style.top = (my + 12) + 'px';
  menu.style.display = 'flex';
}
function sHideMenu() { const m = document.getElementById('sEdgeMenu'); if (m) m.style.display = 'none'; sSelEdge = null; }
function sSetKind(k) { if (sSelEdge != null && sE[sSelEdge]) { sE[sSelEdge].kind = k; } sHideMenu(); sSave(); sDrawEdges(); }
function sReverseEdge() { if (sSelEdge != null && sE[sSelEdge]) { const e = sE[sSelEdge]; const t = e.from; e.from = e.to; e.to = t; } sHideMenu(); sSave(); sDrawEdges(); }
function sDelEdge() { if (sSelEdge != null) sE.splice(sSelEdge, 1); sHideMenu(); sSave(); sDrawEdges(); }

/* ---- hesap ---- */
function sPropagate(ru, u, v, e, warns) {
  if (e.kind === 'shaft') return { n: ru.n, dir: ru.dir, M: ru.M, lin: ru.lin, Q: ru.Q };
  if (ru.n == null) { warns.push(`${sLabel(u)} → ${sLabel(v)}: kavrama için dönme hızı gerekli (buraya dönme ulaşmıyor).`); return null; }
  const zu = sNum(u.params.z), zv = sNum(v.params.z);
  const du = sNum(u.params.d), dv = sNum(v.params.d);
  const tu = u.type, tv = v.type;
  if ((tu === 'disli' && tv === 'disli') || (tu === 'konik' && tv === 'konik')) {
    if (!(zu > 0 && zv > 0)) { warns.push(`${sLabel(u)} → ${sLabel(v)}: kavrama için iki dişlinin de diş sayısı gerekli.`); return null; }
    const mu = sNum(u.params.m), mv = sNum(v.params.m);
    if (mu > 0 && mv > 0 && Math.abs(mu - mv) > 1e-6)
      warns.push(`${sLabel(u)} → ${sLabel(v)}: kavrama için modüller eşit olmalı (${fmt(mu, 2)} ≠ ${fmt(mv, 2)} mm).`);
    return { n: ru.n * zu / zv, dir: tu === 'disli' ? -ru.dir : ru.dir, M: ru.M != null ? ru.M * zv / zu : null };
  }
  if (tu === 'sonsuz' && tv === 'disli') {
    const ag = sNum(u.params.ag);
    if (!(ag > 0 && zv > 0)) { warns.push(`${sLabel(u)} → ${sLabel(v)}: sonsuz vidanın ağız sayısı ve çarkın diş sayısı gerekli.`); return null; }
    return { n: ru.n * ag / zv, dir: ru.dir, M: ru.M != null ? ru.M * zv / ag : null };
  }
  if (tu === 'disli' && tv === 'sonsuz') {
    warns.push(`${sLabel(u)} → ${sLabel(v)}: sonsuz vida geriye doğru sürülemez (oto-kilit) — oka tıklayıp ⇄ ile yönü çevir.`);
    return null;
  }
  if (tu === 'disli' && tv === 'kremayer') {
    const mu = sNum(u.params.m), zpu = sNum(u.params.z);
    const d0 = (mu > 0 && zpu > 0) ? mu * zpu : null;
    if (!(d0 > 0)) { warns.push(`${sLabel(u)} → ${sLabel(v)}: kremayer için pinyonun modülü ve diş sayısı gerekli.`); return null; }
    return { n: null, dir: ru.dir, M: null, lin: PI * d0 * ru.n };
  }
  if (tu === 'kasnak' && tv === 'kasnak') {
    if (!(du > 0 && dv > 0)) { warns.push(`${sLabel(u)} → ${sLabel(v)}: kayış bağlantısı için iki kasnağın da çapı gerekli.`); return null; }
    return { n: ru.n * du / dv, dir: ru.dir, M: ru.M != null ? ru.M * dv / du : null };
  }
  if (tu === 'zincir' && tv === 'zincir') {
    if (!(zu > 0 && zv > 0)) { warns.push(`${sLabel(u)} → ${sLabel(v)}: zincir bağlantısı için iki dişlinin de diş sayısı gerekli.`); return null; }
    return { n: ru.n * zu / zv, dir: ru.dir, M: ru.M != null ? ru.M * zv / zu : null };
  }
  warns.push(`${sLabel(u)} → ${sLabel(v)}: bu ikili "kavrama" ile bağlanamaz — oka tıklayıp "═ Aynı mil" seç.`);
  return null;
}
/* elemanın kendine özgü çıktılarını hesaba işle (doğrusal hız, debi...) */
function sAugment(nd, r) {
  const P = nd.params;
  if (nd.type === 'vida') {
    const Ph = sNum(P.Ph);
    if (Ph > 0 && r.n != null) r.lin = Ph * r.n;
  } else if (nd.type === 'vidasomun') {
    const p = sNum(P.P), ag = sNum(P.ag) || 1;
    if (p > 0 && r.n != null) r.lin = p * ag * r.n;
  } else if (nd.type === 'difvida') {
    const a = sNum(P.Pdd), b = sNum(P.Pdi);
    if (a != null && b != null && r.n != null) r.lin = (a - b) * r.n;
  } else if (nd.type === 'kremayer') {
    r.n = null;
  } else if (nd.type === 'piston') {
    const d = sNum(P.d);
    if (d > 0 && r.lin != null) r.Q = PI / 4 * d * d * r.lin / 1000;  // ml/dak
    r.n = null;
  } else if (nd.type === 'hazne') {
    r.n = null;
  }
}
function sResHTML(n, r) {
  const P = n.params;
  let h = '';
  if (n.type === 'hazne') {
    h = '';
  } else if (r.n != null) {
    h = `<b>${fmt(r.n, 3)} d/dak</b> ${r.dir > 0 ? '↻' : '↺'}`;
    if (r.M != null) h += ` · M = ${fmt(r.M, 1)} N·mm`;
  } else if (r.lin != null) {
    h = `<b>${fmt(r.lin, 3)} mm/dak</b> doğrusal`;
  } else if (r.Q != null) {
    h = `<b>${fmt(r.Q, 4)} ml/dak</b>`;
  }
  const dd = sNum(P.d);
  if (n.type === 'disli' || n.type === 'konik') {
    const m = sNum(P.m), z = sNum(P.z);
    if (m > 0 && z > 0) {
      const d0 = m * z, da = d0 + 2 * m, df = d0 - 2.5 * m;
      h += `<br>d₀ = ${fmt(d0, 2)} · da = ${fmt(da, 2)} · df = ${fmt(df, 2)} mm`;
      if (r.n != null) h += `<br>çevresel hız: ${fmt(PI * d0 * r.n / 60000, 4)} m/s`;
    }
  }
  if (n.type === 'kasnak' && dd > 0 && r.n != null) {
    h += `<br>çevresel hız: ${fmt(PI * dd * r.n / 60000, 4)} m/s`;
  }
  if (n.type === 'zincir') {
    const z = sNum(P.z), p = sNum(P.p);
    if (z > 0 && p > 0 && r.n != null) {
      const d0 = p / Math.sin(PI / z);
      h += `<br>d₀ = ${fmt(d0, 2)} mm · zincir hızı: ${fmt(PI * d0 * r.n / 60000, 4)} m/s`;
    }
  }
  if (n.type === 'sonsuz' && r.n != null) {
    const ag = sNum(P.ag);
    if (ag > 0) h += `<br>1 devirde çarkı ${fmt(ag, 0)} diş döndürür`;
  }
  if (n.type === 'mil') {
    const L = sNum(P.L);
    if (dd > 0 && r.M != null) {
      h += `<br>burulma gerilmesi: τ = ${fmt(16 * r.M / (PI * dd * dd * dd), 2)} N/mm²`;
      if (L > 0) {
        const G = 80000, J = PI * dd * dd * dd * dd / 32;   // çelik G≈80 GPa
        h += `<br>burulma açısı: θ = ${fmt(r.M * L / (G * J) * 180 / PI, 3)}° <span style="color:var(--muted)">(boy ${fmt(L, 0)} mm)</span>`;
      }
    } else if (L > 0) h += `<br>boy: ${fmt(L, 1)} mm`;
  }
  if (n.type === 'kaplin' && r.M != null) {
    const Mmax = sNum(P.Mmax);
    if (Mmax > 0) h += r.M > Mmax
      ? `<br><span style="color:#ef4444;">⚠ tork aşımı! ${fmt(r.M, 1)} &gt; ${fmt(Mmax, 1)} N·mm</span>`
      : `<br>✓ tork uygun (${fmt(r.M, 1)} ≤ ${fmt(Mmax, 1)} N·mm)`;
  }
  if (n.type === 'vida') {
    const Ph = sNum(P.Ph), ds = sNum(P.ds), L = sNum(P.L);
    if (Ph > 0 && r.n != null) {
      const vlin = Ph * r.n;
      h += `<br>ilerleme: ${fmt(Ph, 3)} mm/dev · <b>${fmt(vlin, 3)} mm/dak</b>`;
      if (ds > 0) {
        const qml = PI / 4 * ds * ds * Ph / 1000;
        h += `<br>💧 dozaj: ${fmt(qml, 4)} ml/dev · ${fmt(qml * r.n, 4)} ml/dak · <b>${fmt(qml * r.n * 60, 3)} ml/saat</b>`;
      }
      if (L > 0 && vlin > 0) {
        h += `<br>📏 strok ${fmt(L, 0)} mm → tam süre: <b>${fmt(L / vlin, 1)} dak</b>`;
        if (ds > 0) h += ` · toplam hacim: <b>${fmt(PI / 4 * ds * ds * L / 1000, 3)} ml</b>`;
      }
    }
  }
  if (n.type === 'vidasomun' && r.n != null) {
    const p = sNum(P.P), ag = sNum(P.ag) || 1, dic = sNum(P.dic);
    if (p > 0) {
      const Ph = p * ag;
      h += `<br>hatve: ${fmt(Ph, 3)} mm/dev · somun hızı: <b>${fmt(Ph * r.n, 3)} mm/dak</b>`;
      if (dd > 0 && dic > 0) {
        const d2 = (dd + dic) / 2;
        h += `<br>d₂ = ${fmt(d2, 2)} mm · helis açısı β = ${fmt(Math.atan(Ph / (PI * d2)) * 180 / PI, 2)}°`;
      }
      const L = sNum(P.L), vlin = Ph * r.n;
      if (L > 0 && vlin > 0) h += `<br>📏 strok ${fmt(L, 0)} mm → tam süre: <b>${fmt(L / vlin, 1)} dak</b>`;
    }
  }
  if (n.type === 'difvida' && r.n != null) {
    const a = sNum(P.Pdd), b = sNum(P.Pdi), c = sNum(P.Pid);
    if (a != null && b != null) {
      h += `<br>dış vida: dış adım ${fmt(a, 2)} / iç adım ${fmt(b, 2)} mm`;
      const netv = (a - b) * r.n;
      h += `<br>net ilerleme: <b>${fmt(a - b, 3)} mm/dev</b> · ${fmt(netv, 4)} mm/dak 🎯`;
      const L = sNum(P.L);
      if (L > 0 && Math.abs(netv) > 1e-9) h += `<br>📏 strok ${fmt(L, 0)} mm → tam süre: <b>${fmt(Math.abs(L / netv), 1)} dak</b>`;
      if (c != null && Math.abs(c - b) > 1e-6)
        h += `<br><span style="color:#ef4444;">⚠ iç vidanın dış adımı (${fmt(c, 2)}), dış vidanın iç adımına (${fmt(b, 2)}) eşit olmalı — kavramaz.</span>`;
    }
  }
  if (n.type === 'kremayer' && r.lin != null) {
    h += `<br>${fmt(r.lin / 60000, 4)} m/s doğrusal hız`;
    const L = sNum(P.L);
    if (L > 0 && Math.abs(r.lin) > 1e-9) h += `<br>📏 boy ${fmt(L, 0)} mm → uçtan uca: <b>${fmt(Math.abs(L / r.lin), 2)} dak</b>`;
  }
  if (n.type === 'piston') {
    if (dd > 0) h += `<br>alan: ${fmt(PI / 4 * dd * dd, 2)} mm²`;
    if (r.Q != null) h += `<br>💧 debi: <b>${fmt(r.Q, 4)} ml/dak</b> · ${fmt(r.Q * 60, 3)} ml/saat`;
  }
  if (n.type === 'hazne') {
    const Dd = sNum(P.Dd), et = sNum(P.et), L = sNum(P.L);
    if (Dd > 0 && et != null && L > 0) {
      const Di = Dd - 2 * et;
      if (Di > 0) {
        const V = PI / 4 * Di * Di * L / 1000;   // ml
        h += `<br>iç çap: ${fmt(Di, 2)} mm · hacim: <b>${fmt(V, 3)} ml</b>`;
        if (r.Q > 0) {
          const dk = V / r.Q;
          h += `<br>⏱ dolum/boşalma: <b>${fmt(dk, 1)} dak</b> (${fmt(dk / 60, 2)} saat)`;
        }
      } else {
        h += `<br><span style="color:#ef4444;">⚠ et kalınlığı çapa göre çok büyük</span>`;
      }
    }
  }
  return h || '—';
}

function sCalc() {
  const warns = [], res = {};
  const sum = document.getElementById('sSummary');
  if (!sN.length) { if (sum) sum.innerHTML = '<div class="empty">Şema boş — önce yukarıdan eleman ekle. 👆</div>'; return; }
  const motors = sN.filter(n => n.type === 'motor');
  if (!motors.length) warns.push('Şemada motor yok — ⚡ Motor ekleyip zincirin başına bağla.');
  for (const m of motors) {
    const n0 = sNum(m.params.n);
    if (!(n0 > 0)) { warns.push(`${sLabel(m)}: devir (d/dak) girilmemiş.`); continue; }
    res[m.id] = { n: n0, dir: 1, M: sNum(m.params.M) };
  }
  const q = motors.filter(m => res[m.id]);
  while (q.length) {
    const u = q.shift();
    for (const e of sE) {
      if (e.from !== u.id) continue;
      const v = sN.find(n => n.id === e.to);
      if (!v) continue;
      const r = sPropagate(res[u.id], u, v, e, warns);
      if (!r) continue;
      if (res[v.id]) {
        const eski = res[v.id].n, yeni = r.n;
        if (eski != null && yeni != null && Math.abs(eski - yeni) > 1e-6)
          warns.push(`${sLabel(v)}: iki farklı hız geliyor (${fmt(eski, 3)} ve ${fmt(yeni, 3)} d/dak) — bağlantıları kontrol et.`);
        continue;
      }
      sAugment(v, r);
      res[v.id] = r;
      q.push(v);
    }
  }
  /* kutu içi sonuçlar */
  for (const n of sN) {
    const el = document.getElementById('sRes' + n.id);
    if (!el) continue;
    const r = res[n.id];
    const ico = document.getElementById('sIco' + n.id);
    if (!r) {
      el.innerHTML = '<span style="color:#ef4444;">— güç ulaşmıyor (bağlantı yok?)</span>';
      if (ico) ico.style.animation = 'none';
      if (n.type !== 'motor') warns.push(`${sLabel(n)}: motor zincirine bağlı değil.`);
      continue;
    }
    el.innerHTML = sResHTML(n, r);
    if (ico) {
      const spinning = ['motor', 'disli', 'konik', 'sonsuz', 'kasnak', 'zincir', 'mil', 'vida', 'vidasomun', 'difvida', 'kaplin'].includes(n.type);
      if (spinning && r.n != null && Math.abs(r.n) > 1e-9) {
        const dur = Math.max(0.4, Math.min(6, 30 / Math.abs(r.n)));
        ico.style.animation = `sspin ${dur.toFixed(2)}s linear infinite`;
        ico.style.animationDirection = r.dir < 0 ? 'reverse' : 'normal';
      } else {
        ico.style.animation = 'none';
      }
    }
  }
  /* özet panel */
  if (!sum) return;
  let h = '';
  for (const w of warns) h += `<div class="err" style="margin-bottom:8px;">⚠️ ${w}</div>`;
  for (const n of sN) {
    const r = res[n.id];
    let vt = '—', ut = '';
    if (r) {
      if (n.type === 'hazne' && r.Q != null) { vt = fmt(r.Q, 4); ut = 'ml/dak'; }
      else if (r.n != null) { vt = fmt(r.n, 3); ut = 'd/dak ' + (r.dir > 0 ? '↻' : '↺'); }
      else if (r.lin != null) { vt = fmt(r.lin, 3); ut = 'mm/dak'; }
      else if (r.Q != null) { vt = fmt(r.Q, 4); ut = 'ml/dak'; }
    }
    h += `<div class="result-row"><div class="r-label">${sLabel(n)}<small>${S_TYPES[n.type].name}</small></div>
      <div class="r-val">${vt}<span>${ut}</span></div></div>`;
  }
  const m0 = motors.find(m => res[m.id]);
  if (m0) {
    const leaves = sN.filter(n => res[n.id] && n.id !== m0.id && !sE.some(e => e.from === n.id));
    for (const lf of leaves) {
      if (res[lf.id].n > 0) {
        h += `<div class="result-row highlight"><div class="r-label">Toplam iletim oranı<small>${sLabel(m0)} → ${sLabel(lf)}</small></div>
          <div class="r-val">i = ${fmt(res[m0.id].n / res[lf.id].n, 3)}<span></span></div></div>`;
      }
    }
    for (const n of sN) {
      const r = res[n.id];
      if (!r) continue;
      if (n.type === 'vida') {
        const Ph = sNum(n.params.Ph), ds = sNum(n.params.ds);
        if (Ph > 0 && ds > 0 && r.n != null) {
          const qml = PI / 4 * ds * ds * Ph / 1000;
          h += `<div class="result-row highlight"><div class="r-label">💧 Dozaj — ${sLabel(n)}<small>q = π/4·d²·Ph · n</small></div>
            <div class="r-val">${fmt(qml * r.n * 60, 3)}<span>ml/saat</span></div></div>`;
        }
      }
      if (n.type === 'piston' && r.Q != null) {
        h += `<div class="result-row highlight"><div class="r-label">💧 Debi — ${sLabel(n)}<small>Q = A · v</small></div>
          <div class="r-val">${fmt(r.Q * 60, 3)}<span>ml/saat</span></div></div>`;
      }
      if (n.type === 'hazne' && r.Q > 0) {
        const Dd = sNum(n.params.Dd), et = sNum(n.params.et), L = sNum(n.params.L);
        if (Dd > 0 && et != null && L > 0 && Dd - 2 * et > 0) {
          const V = PI / 4 * (Dd - 2 * et) * (Dd - 2 * et) * L / 1000;
          h += `<div class="result-row highlight"><div class="r-label">⏱ Dolum süresi — ${sLabel(n)}<small>t = V / Q</small></div>
            <div class="r-val">${fmt(V / r.Q, 1)}<span>dak</span></div></div>`;
        }
      }
    }
  }
  sum.innerHTML = h || '<div class="empty">Sonuç üretilemedi.</div>';
}

/* Ters Tasarım çıktısını Şemaya kur */
function terspompaToSchema() {
  const g = (id) => { const el = document.getElementById('in_' + id); return el ? parseFloat(String(el.value).replace(',', '.')) : NaN; };
  const Q = g('Q'), V = g('V'), n = g('n'), ds = g('ds'), Ph = g('Ph'), z1 = g('z1');
  if (!(n > 0 && ds > 0 && Ph > 0 && z1 > 0 && Q > 0)) {
    alert('Önce geçerli değerler gir: hedef dozaj, motor devri, şırınga çapı, vida hatvesi ve pinyon diş sayısı.');
    return;
  }
  const A = PI / 4 * ds * ds;
  const nScrew = Q / (A * Ph / 1000 * 60);      // gerekli vida devri
  const i = n / nScrew;                          // gerekli redüksiyon
  const stroke = V > 0 ? V * 1000 / A : 60;
  const S = (x) => String(Math.round(x * 1000) / 1000);
  const nodes = [{ id: 1, type: 'motor', x: 40, y: 90, params: { ad: 'Motor', n: S(n), M: '' } }];
  const edges = [];
  let idx = 2, prev = 1, xx = 250;
  if (i > 8) {                                   // yüksek oran → sonsuz vida
    const zc = Math.max(1, Math.round(i));
    nodes.push({ id: idx, type: 'sonsuz', x: xx, y: 90, params: { ag: '1', d: '' } });
    edges.push({ from: prev, to: idx, kind: 'shaft' }); prev = idx; idx++; xx += 210;
    nodes.push({ id: idx, type: 'disli', x: xx, y: 90, params: { m: '1', z: S(zc) } });
    edges.push({ from: prev, to: idx, kind: 'mesh' }); prev = idx; idx++; xx += 210;
  } else {                                        // düşük oran → düz dişli çifti
    const z2 = Math.max(1, Math.round(z1 * i));
    nodes.push({ id: idx, type: 'disli', x: xx, y: 90, params: { m: '1', z: S(z1) } });
    edges.push({ from: prev, to: idx, kind: 'shaft' }); prev = idx; idx++; xx += 210;
    nodes.push({ id: idx, type: 'disli', x: xx, y: 90, params: { m: '1', z: S(z2) } });
    edges.push({ from: prev, to: idx, kind: 'mesh' }); prev = idx; idx++; xx += 210;
  }
  nodes.push({ id: idx, type: 'vida', x: xx, y: 90, params: { Ph: S(Ph), ds: S(ds), L: S(stroke) } });
  edges.push({ from: prev, to: idx, kind: 'shaft' }); prev = idx; idx++; xx += 210;
  nodes.push({ id: idx, type: 'piston', x: xx, y: 90, params: { d: S(ds), t: '5' } });
  edges.push({ from: prev, to: idx, kind: 'shaft' }); prev = idx; idx++; xx += 210;
  nodes.push({ id: idx, type: 'hazne', x: xx, y: 90, params: { Dd: S(ds + 2), et: '1', L: S(stroke) } });
  edges.push({ from: prev, to: idx, kind: 'shaft' }); prev = idx; idx++;
  sN = nodes; sE = edges; sNext = idx; sLinkSrc = null;
  sSave();
  go('sema');
  sCalc();
}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ---------- malzemeler ---------- */
const MAT = {
  steel:  () => new THREE.MeshStandardMaterial({ color: 0x9fb2c8, metalness: .95, roughness: .32 }),
  brass:  () => new THREE.MeshStandardMaterial({ color: 0xd9a441, metalness: .95, roughness: .3 }),
  dark:   () => new THREE.MeshStandardMaterial({ color: 0x3a4657, metalness: .9,  roughness: .45 }),
  blue:   () => new THREE.MeshStandardMaterial({ color: 0x3b82f6, metalness: .85, roughness: .35 }),
  rubber: () => new THREE.MeshStandardMaterial({ color: 0x232a33, metalness: .05, roughness: .92 }),
};

/* ---------- geometri yardımcıları ---------- */
function gearShape(z, m, o = {}) {
  const add = (o.add ?? 1.0) * m, ded = (o.ded ?? 1.25) * m;
  const r0 = m * z / 2, ra = r0 + add, rf = Math.max(r0 - ded, m);
  const t = Math.PI * 2 / z;
  const f1 = o.f1 ?? .13, f2 = o.f2 ?? .37, f3 = .5;
  const s = new THREE.Shape();
  const px = (ang, r) => [r * Math.cos(ang), r * Math.sin(ang)];
  for (let i = 0; i < z; i++) {
    const a = i * t;
    if (i === 0) s.moveTo(...px(a, rf)); else s.lineTo(...px(a, rf));
    s.lineTo(...px(a + t * f1, ra));
    s.lineTo(...px(a + t * f2, ra));
    s.lineTo(...px(a + t * f3, rf));
    s.absarc(0, 0, rf, a + t * f3, a + t, false);
  }
  s.closePath();
  const holeR = o.hole ?? Math.max(rf * .28, m * 1.1);
  if (holeR > 0) { const h = new THREE.Path(); h.absarc(0, 0, holeR, 0, Math.PI * 2, true); s.holes.push(h); }
  return s;
}
function gearMesh(z, m, depth, mat, o) {
  const geo = new THREE.ExtrudeGeometry(gearShape(z, m, o), {
    depth, bevelEnabled: true, bevelThickness: m * .12, bevelSize: m * .1, bevelSegments: 1, curveSegments: 4,
  });
  geo.translate(0, 0, -depth / 2);
  return new THREE.Mesh(geo, mat);
}
function helicalGearMesh(z, m, depth, mat, twist) {
  const n = 10, g = new THREE.Group(), sliceD = depth / n, shape = gearShape(z, m);
  for (let i = 0; i < n; i++) {
    const geo = new THREE.ExtrudeGeometry(shape, { depth: sliceD * 1.08, bevelEnabled: false, curveSegments: 4 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.z = -depth / 2 + i * sliceD;
    mesh.rotation.z = twist * (i / (n - 1) - .5);
    g.add(mesh);
  }
  return g;
}
function ringMesh(rOut, rIn, depth, mat) {

/* ---------- 3D modeller ---------- */
function buildSpur(P) {
  const m = 4, z1 = P.z1, z2 = P.z2, depth = 16;
  const r1 = m * z1 / 2, r2 = m * z2 / 2;
  const t1 = Math.PI * 2 / z1, t2 = Math.PI * 2 / z2;
  const g1 = gearMesh(z1, m, depth, MAT.steel());
  const g2 = gearMesh(z2, m, depth, MAT.brass());
  g1.position.x = -r1; g2.position.x = r2;
  const s1 = shaftZ(m * 1.02, depth * 3, MAT.dark()); s1.position.x = -r1;
  const s2 = shaftZ(m * 1.02, depth * 3, MAT.dark()); s2.position.x = r2;
  const grp = new THREE.Group(); grp.add(g1, g2, s1, s2);
  const rot10 = -t1 * .25, rot20 = Math.PI - t2 * .75;
  let th = 0;
  return {
    group: grp,
    update(dt, sp) {
      th += dt * sp * 1.2;
      g1.rotation.z = rot10 + th;
      g2.rotation.z = rot20 - th * z1 / z2;
    },
    info: `⚙️ <b>Silindirik düz dişli çift</b> — z₁ = ${z1}, z₂ = ${z2}, m = 4 mm. İletim oranı <b>i = z₂/z₁ = ${(z2 / z1).toFixed(2)}</b>; pinyon ${(z2 / z1).toFixed(2)} tur attığında büyük çark 1 tur atar ve çarklar <b>zıt yönde</b> döner. Üstteki z₁ / z₂ sürgüleriyle diş sayılarını değiştir.`,
  };
}
function buildHelical(P) {
  const m = 4, z1 = P.z1, z2 = P.z2, depth = 24, tw = .5;
  const r1 = m * z1 / 2, r2 = m * z2 / 2;
  const t1 = Math.PI * 2 / z1, t2 = Math.PI * 2 / z2;
  const g1 = helicalGearMesh(z1, m, depth, MAT.steel(), tw);
  const g2 = helicalGearMesh(z2, m, depth, MAT.brass(), -tw);
  g1.position.x = -r1; g2.position.x = r2;
  const s1 = shaftZ(m * 1.02, depth * 2.6, MAT.dark()); s1.position.x = -r1;
  const s2 = shaftZ(m * 1.02, depth * 2.6, MAT.dark()); s2.position.x = r2;
  const grp = new THREE.Group(); grp.add(g1, g2, s1, s2);
  const rot10 = -t1 * .25, rot20 = Math.PI - t2 * .75;
  let th = 0;
  return {
    group: grp,
    update(dt, sp) {
      th += dt * sp * 1.2;
      g1.rotation.z = rot10 + th;
      g2.rotation.z = rot20 - th * z1 / z2;
    },
    info: `🦷 <b>Helisel dişli çift</b> — dişler eksene açılı (β) olduğu için kavrama kademeli başlar: daha <b>sessiz ve yumuşak</b> çalışır, ama eksenel kuvvet doğurur. Karşılıklı çarkların helis yönleri zıttır (sağ/sol helis). i = z₂/z₁ = ${(z2 / z1).toFixed(2)}.`,
  };
}
function pulleyMesh(r, w, matRim, matSpoke) {
  const g = new THREE.Group();
  g.add(ringMesh(r, r * .78, w, matRim));
  g.add(shaftZ(r * .2, w * 1.05, matRim));
  for (let i = 0; i < 4; i++) {
    const sp = new THREE.Mesh(new THREE.BoxGeometry(r * .62, r * .16, w * .5), matSpoke);
    sp.position.set(Math.cos(i * Math.PI / 2) * r * .49, Math.sin(i * Math.PI / 2) * r * .49, 0);
    sp.rotation.z = i * Math.PI / 2;
    g.add(sp);
  }

}
function beltShapePath(c1x, c2x, R1, R2, isHole) {
  const a = c2x - c1x;
  const phi = Math.acos((R1 - R2) / a);
  const P = isHole ? new THREE.Path() : new THREE.Shape();
  P.absarc(c1x, 0, R1, phi, Math.PI * 2 - phi, false);
  P.lineTo(c2x + R2 * Math.cos(-phi), R2 * Math.sin(-phi));
  P.absarc(c2x, 0, R2, -phi, phi, false);
  P.closePath();
  return P;
}
function buildBelt() {
  const r1 = 55, r2 = 30, a = 150, w = 22, h = 3.2;
  const c1x = -a / 2, c2x = a / 2;
  const p1 = pulleyMesh(r1, w, MAT.steel(), MAT.dark()); p1.position.x = c1x;
  const p2 = pulleyMesh(r2, w, MAT.brass(), MAT.dark()); p2.position.x = c2x;
  const sh1 = shaftZ(r1 * .11, w * 3, MAT.dark()); sh1.position.x = c1x;
  const sh2 = shaftZ(r2 * .16, w * 3, MAT.dark()); sh2.position.x = c2x;
  const beltShape = beltShapePath(c1x, c2x, r1 + h, r2 + h, false);
  beltShape.holes.push(beltShapePath(c1x, c2x, r1 - h, r2 - h, true));
  const beltGeo = new THREE.ExtrudeGeometry(beltShape, { depth: w * .55, bevelEnabled: false, curveSegments: 48 });
  beltGeo.translate(0, 0, -w * .55 / 2);
  const belt = new THREE.Mesh(beltGeo, MAT.rubber());
  const grp = new THREE.Group(); grp.add(p1, p2, sh1, sh2, belt);
  return {
    group: grp,
    update(dt, sp) {
      const w1 = dt * sp * 1.4;
      p1.rotation.z += w1;
      p2.rotation.z += w1 * r1 / r2;
    },
    info: `🛞 <b>Kayış–kasnak mekanizması</b> — dm₁ = ${2 * r1} mm, dm₂ = ${2 * r2} mm. Açık kayışta iki kasnak <b>aynı yönde</b> döner; küçük kasnak i = dm₁/dm₂ = ${(r1 / r2).toFixed(2)} kat hızlı döner. Kayış hızı her noktada aynıdır: V = π·dm·n / (1000·60).`,
  };
}
function buildChain() {
  const p = 13, z1 = 21, z2 = 13, aDist = 130;
  const r1 = p / (2 * Math.sin(Math.PI / z1));
  const r2 = p / (2 * Math.sin(Math.PI / z2));
  const c1x = -aDist / 2, c2x = aDist / 2;
  const gopt = { f1: .2, f2: .3, add: .85, ded: .9 };
  const g1 = gearMesh(z1, 2 * r1 / z1, 7, MAT.steel(), gopt); g1.position.x = c1x;
  const g2 = gearMesh(z2, 2 * r2 / z2, 7, MAT.steel(), gopt); g2.position.x = c2x;
  const s1 = shaftZ(6, 30, MAT.dark()); s1.position.x = c1x;
  const s2 = shaftZ(5, 30, MAT.dark()); s2.position.x = c2x;
  const phi = Math.acos((r1 - r2) / aDist);
  const pt = (cx, r, ang) => new THREE.Vector2(cx + r * Math.cos(ang), r * Math.sin(ang));
  const path = new THREE.CurvePath();
  path.add(new THREE.EllipseCurve(c1x, 0, r1, r1, phi, Math.PI * 2 - phi, false));
  path.add(new THREE.LineCurve(pt(c1x, r1, -phi), pt(c2x, r2, -phi)));
  path.add(new THREE.EllipseCurve(c2x, 0, r2, r2, -phi, phi, false));
  path.add(new THREE.LineCurve(pt(c2x, r2, phi), pt(c1x, r1, phi)));
  const L = path.getLength();
  const n = Math.max(10, Math.round(L / p));
  const geoA = new THREE.BoxGeometry(p * .9, 4.6, 7);
  const geoB = new THREE.BoxGeometry(p * .68, 4.6, 10);
  const matA = MAT.steel(), matB = MAT.dark();
  const grp = new THREE.Group(); grp.add(g1, g2, s1, s2);
  const links = [];
  for (let i = 0; i < n; i++) {
    const mesh = new THREE.Mesh(i % 2 ? geoB : geoA, i % 2 ? matB : matA);
    links.push(mesh); grp.add(mesh);
  }
  let off = 0, th = 0;
  const place = () => {
    for (let i = 0; i < n; i++) {
      const u = ((i / n + off) % 1 + 1) % 1;
      const P2 = path.getPointAt(u), T2 = path.getTangentAt(u);
      links[i].position.set(P2.x, P2.y, 0);

    group: grp,
    update(dt, sp) {
      const v = dt * sp * 45;           // zincir çizgisel hızı (mm/kare)
      off = (off + v / L) % 1;
      th += v;
      g1.rotation.z = th / r1;
      g2.rotation.z = th / r2;
      place();
    },
    info: `🔗 <b>Zincir–dişli mekanizması</b> — z₁ = ${z1}, z₂ = ${z2}, adım p = ${p} mm. Zincirde <b>kayma olmaz</b>; iletim oranı tam olarak i = z₁/z₂ = ${(z1 / z2).toFixed(2)}'dir. Taksimat çapı d₀ = p / sin(180°/z) formülüyle bulunur (bkz. Zincir Dişli Çark hesabı).`,
  };
}
function buildBearing() {
  const grp = new THREE.Group();
  const outer = ringMesh(40, 30, 16, MAT.steel());
  const innerG = new THREE.Group();
  innerG.add(ringMesh(23, 15, 16, MAT.steel()));
  const shaft = shaftZ(14.6, 64, MAT.dark());
  const key = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 64), MAT.brass());
  key.position.y = 14.8;
  innerG.add(shaft, key);
  const balls = new THREE.Group();
  const nb = 9;
  for (let i = 0; i < nb; i++) {
    const b = new THREE.Mesh(new THREE.SphereGeometry(4.6, 24, 16), MAT.steel());
    const a = i / nb * Math.PI * 2;
    b.position.set(Math.cos(a) * 26.5, Math.sin(a) * 26.5, 0);
    balls.add(b);
  }
  grp.add(outer, innerG, balls);
  return {
    group: grp,
    update(dt, sp) {

      innerG.rotation.z += w;
      balls.rotation.z += w * .44;   // bilyeler iç bileziğin ~yarısı hızla yörüngede döner

  };
}
function buildSpring() {
  const R = 26, d = 6, turns = 7, H = 95;
  const curve = new HelixCurve(R, H / turns, turns);
  const spring = new THREE.Mesh(new THREE.TubeGeometry(curve, 320, d / 2, 14, false), MAT.steel());
  const plateGeo = new THREE.CylinderGeometry(R + d, R + d, 4, 48);
  const top = new THREE.Mesh(plateGeo, MAT.dark());
  const bot = new THREE.Mesh(plateGeo.clone(), MAT.dark());
  bot.position.y = -(H / 2 + d / 2 + 2);
  const grp = new THREE.Group(); grp.add(spring, top, bot);
  let T = 0;
  return {
    group: grp,
    update(dt, sp) {
      T += dt * sp;
      const s = .74 + .24 * Math.sin(T * 2);
      spring.scale.y = s;
      spring.position.y = -(H / 2) * (1 - s);
      top.position.y = H * s - H / 2 + d / 2 + 2;
    },
    info: `🌀 <b>Helisel basma yayı</b> — dm = ${2 * R} mm, tel çapı d = ${d} mm, z = ${turns} sarım. Yük altında sıkışır, kalkınca geri açılır; enerji depolar. Tel boyu L₀ = dm·π·(z+2) formülüyle bulunur (bkz. Helisel Yay hesabı).`,
  };
}
function buildBolt() {
  const rs = 10, Lsh = 90, pitch = 6;
  const head = hexMesh(19, 13, MAT.steel());
  head.geometry.rotateX(Math.PI / 2);
  head.position.y = Lsh / 2 + 6.5;
  const shank = new THREE.Mesh(new THREE.CylinderGeometry(rs, rs, Lsh, 32), MAT.steel());
  const tip = new THREE.Mesh(new THREE.CylinderGeometry(rs * .7, rs, 6, 32), MAT.steel());
  tip.position.y = -(Lsh / 2 + 3);
  const thr = new THREE.Mesh(
    new THREE.TubeGeometry(new HelixCurve(rs + 1.1, pitch, 11), 480, 1.35, 10, false), MAT.dark());
  thr.position.y = -Lsh / 2 + (pitch * 11) / 2;
  const nut = hexMesh(17, 11, MAT.brass(), rs + 2.6);
  nut.geometry.rotateX(Math.PI / 2);
  const grp = new THREE.Group(); grp.add(head, shank, tip, thr, nut);
  let T = 0;
  return {
    group: grp,
    update(dt, sp) {
      T += dt * sp;
      const u = (Math.sin(T * .8) + 1) / 2;

      nut.rotation.y = -(y / pitch) * Math.PI * 2;

    info: `🔩 <b>Civata–somun bağlantısı</b> — somun, vida helisi üzerinde dönerek ilerler: <b>bir tam tur = bir adım (hatve)</b> kadar yol. Sökülebilir bağlantıların en yaygınıdır. Sıkma momenti M ≈ 0.2·F·d (bkz. Civata Mukavemeti hesabı).`,
  };

const BUILDERS = { spur: buildSpur, helical: buildHelical, belt: buildBelt, chain: buildChain, bearing: buildBearing, spring: buildSpring, bolt: buildBolt };

/* ---------- 3D Atölye görüntüleyicisi ---------- */
let viewer = null;
function mountViewer() {
  const box = document.getElementById('v3dBox');
  if (!box || box.dataset.mounted) return;
  if (viewer) { viewer.dispose(); viewer = null; }
  try {
    viewer = createViewer(box);
    box.dataset.mounted = '1';
  } catch (err) {
    const msg = document.getElementById('v3dMsg');
    if (msg) msg.innerHTML = '⚠️ 3D sahne başlatılamadı. Tarayıcın WebGL desteklemiyor olabilir.';
  }
}
function createViewer(box) {
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  box.appendChild(renderer.domElement);
  const oldMsg = document.getElementById('v3dMsg'); if (oldMsg) oldMsg.remove();

  const scene = new THREE.Scene();
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), .04).texture;
  scene.add(new THREE.HemisphereLight(0xbfd6ff, 0x0b1220, .5));
  const dirL = new THREE.DirectionalLight(0xffffff, 1.1); dirL.position.set(80, 120, 160); scene.add(dirL);

  const camera = new THREE.PerspectiveCamera(42, 1, 1, 5000);
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = .08;
  controls.autoRotateSpeed = 1.6;

  const P = { z1: 14, z2: 28 };
  let model = null, modelKey = 'spur', speed = 1, paused = false, raf = 0, stopped = false;

  function fitCamera() {
    const sphere = new THREE.Box3().setFromObject(model.group).getBoundingSphere(new THREE.Sphere());
    controls.target.copy(sphere.center);
    const dist = sphere.radius * 2.7;
    camera.position.copy(sphere.center).add(new THREE.Vector3(.55, .4, 1).normalize().multiplyScalar(dist));
    camera.near = dist / 100; camera.far = dist * 20;
    camera.updateProjectionMatrix();
    controls.update();
  }
  function setModel(key) {
    modelKey = key;
    if (model) { scene.remove(model.group); disposeDeep(model.group); }
    model = BUILDERS[key](P);
    scene.add(model.group);
    fitCamera();
    const info = document.getElementById('v3dInfo'); if (info) info.innerHTML = model.info;
    const gc = document.getElementById('v3dGearCtl');
    if (gc) gc.style.display = (key === 'spur' || key === 'helical') ? 'inline-flex' : 'none';
  }

  /* kontroller */
  document.querySelectorAll('#v3dSeg button').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('#v3dSeg button').forEach(x => x.classList.toggle('on', x === b));
      setModel(b.dataset.model);
    };
  });
  const spd = document.getElementById('v3dSpeed');
  if (spd) spd.oninput = () => { speed = parseFloat(spd.value); };
  const pauseBtn = document.getElementById('v3dPause');
  if (pauseBtn) pauseBtn.onclick = () => {
    paused = !paused;
    pauseBtn.textContent = paused ? '▶ Çalıştır' : '⏸ Durdur';
  };
  const autoBtn = document.getElementById('v3dAuto');
  if (autoBtn) autoBtn.onclick = () => {
    controls.autoRotate = !controls.autoRotate;
    autoBtn.style.background = controls.autoRotate ? 'var(--primary)' : '';
    autoBtn.style.color = controls.autoRotate ? '#fff' : '';
  };
  [['v3dZ1', 'z1', 'v3dZ1v'], ['v3dZ2', 'z2', 'v3dZ2v']].forEach(([id, k, lid]) => {
    const el = document.getElementById(id);
    if (el) el.oninput = () => {
      P[k] = parseInt(el.value, 10);
      const l = document.getElementById(lid); if (l) l.textContent = P[k];
      if (modelKey === 'spur' || modelKey === 'helical') setModel(modelKey);
    };
  });

  /* boyutlandırma */
  function resize() {
    const w = box.clientWidth, hgt = box.clientHeight;
    if (!w || !hgt) return;
    renderer.setSize(w, hgt);
    camera.aspect = w / hgt;
    camera.updateProjectionMatrix();
  }
  const ro = new ResizeObserver(resize);
  ro.observe(box);
  resize();

  /* döngü */
  const clock = new THREE.Clock();
  function loop() {
    if (stopped) return;
    if (!box.isConnected) { dispose(); return; }   // sayfadan ayrılınca kendini kapat
    raf = requestAnimationFrame(loop);
    const dt = Math.min(clock.getDelta(), .05);
    if (!paused && model) model.update(dt, speed);
    controls.update();
    renderer.render(scene, camera);
  }
  function dispose() {
    stopped = true;
    cancelAnimationFrame(raf);
    ro.disconnect();
    controls.dispose();
    if (model) disposeDeep(model.group);
    pmrem.dispose();
    renderer.dispose();
    renderer.domElement.remove();
    if (viewer && viewer.box === box) viewer = null;
  }
  setModel('spur');
  loop();
  return { dispose, box };
}

    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pts = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 2.2, transparent: true, opacity: .65, sizeAttenuation: true }));
    scene.add(pts);

    let mx = 0, my = 0, raf = 0, stopped = false;
    const onMove = (e) => {
      mx = (e.clientX / innerWidth - .5);
      my = (e.clientY / innerHeight - .5);
    };
    addEventListener('pointermove', onMove);
    const onResize = () => {
      renderer.setSize(innerWidth, innerHeight, false);
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
    };
    addEventListener('resize', onResize);
    onResize();

    const clock = new THREE.Clock();
    function loop() {
      if (stopped) return;
      raf = requestAnimationFrame(loop);
      const dt = Math.min(clock.getDelta(), .05);
      const t = clock.elapsedTime;
      gears.forEach((gm, i) => {
        gm.rotation.z += gm.userData.sp * dt;
        gm.position.y += Math.sin(t * .5 + i * 1.7) * .06;
      });
      pts.rotation.y += dt * .012;
      grp.rotation.y += (mx * .3 - grp.rotation.y) * .04;
      grp.rotation.x += (-my * .2 - grp.rotation.x) * .04;
      renderer.render(scene, camera);
    }
    loop();
    introScene = {
      stop() {
        stopped = true;
        cancelAnimationFrame(raf);
        removeEventListener('pointermove', onMove);
        removeEventListener('resize', onResize);
        disposeDeep(scene);
        pGeo.dispose();
        pmrem.dispose();
        renderer.dispose();
      }
    };
  } catch (err) { /* WebGL yoksa gradyan arka plan yeterli */ }
}

/* ---------- Site geneli 3D arka plan ---------- */
function bgStart() {
  const canvas = document.getElementById('bg3d');
  if (!canvas) return;
  try {
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    const scene = new THREE.Scene();
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), .04).texture;
    scene.add(new THREE.HemisphereLight(0x8fa3ff, 0x0b1020, .55));
    const pl = new THREE.PointLight(0x7c3aed, 26000); pl.position.set(-180, 160, 140); scene.add(pl);
    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 1, 2200);
    camera.position.z = 340;

    const grp = new THREE.Group(); scene.add(grp);
    const defs = [
      { z: 26, m: 8, x: -430, y: 170,  zz: -280, sp: .1,   c: 0x46536f },
      { z: 16, m: 6, x: 450,  y: 230,  zz: -170, sp: -.16, c: 0x5b6b8c },
      { z: 20, m: 7, x: 470,  y: -210, zz: -240, sp: .12,  c: 0x6d54c9 },
      { z: 12, m: 5, x: -450, y: -240, zz: -130, sp: -.2,  c: 0x3d4a63 },
      { z: 34, m: 9, x: -30,  y: -360, zz: -420, sp: .07,  c: 0x46536f },
      { z: 14, m: 5, x: 40,   y: 330,  zz: -360, sp: -.13, c: 0x527086 },
    ];
    const gears = defs.map((d, i) => {
      const gm = gearMesh(d.z, d.m, d.m * 2.4, new THREE.MeshStandardMaterial({ color: d.c, metalness: .9, roughness: .5 }));
      gm.material.envMapIntensity = .55;
      gm.position.set(d.x, d.y, d.zz);
      gm.rotation.x = (i % 2 ? -1 : 1) * .35;
      gm.userData.sp = d.sp;
      grp.add(gm);
      return gm;
    });
    const NP = 150, pos = new Float32Array(NP * 3);
    for (let i = 0; i < NP; i++) {
      pos[i * 3] = (Math.random() - .5) * 1100;
      pos[i * 3 + 1] = (Math.random() - .5) * 700;
      pos[i * 3 + 2] = (Math.random() - .5) * 600 - 100;
    }
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pts = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 2, transparent: true, opacity: .5 }));
    scene.add(pts);

    let mx = 0, my = 0;
    addEventListener('pointermove', (e) => {
      mx = e.clientX / innerWidth - .5;
      my = e.clientY / innerHeight - .5;
    });
    const onResize = () => {
      renderer.setSize(innerWidth, innerHeight, false);
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
    };
    addEventListener('resize', onResize);
    onResize();

    const clock = new THREE.Clock();
    (function loop() {
      requestAnimationFrame(loop);
      const dt = Math.min(clock.getDelta(), .05);
      const t = clock.elapsedTime;
      gears.forEach((gm, i) => {
        gm.rotation.z += gm.userData.sp * dt;
        gm.position.y += Math.sin(t * .4 + i * 1.9) * .04;
      });
      pts.rotation.y += dt * .01;
      grp.rotation.y += (mx * .16 - grp.rotation.y) * .03;
      grp.rotation.x += (-my * .1 - grp.rotation.x) * .03;
      grp.position.y = (window.scrollY || 0) * .05;
      renderer.render(scene, camera);
    })();
  } catch (err) { /* WebGL yoksa degrade arka plan kalır */ }
}

let bgStarted = false;
function bgStartOnce() { if (!bgStarted) { bgStarted = true; bgStart(); } }

window.MH3D = {
  mount: mountViewer,
  introStop() {
    if (introScene) { introScene.stop(); introScene = null; }
    bgStartOnce();   // ağır intro sahnesi kapanınca hafif arka plan sahnesi devralır
  },
};

/* modül yüklendiğinde: intro açıksa onu, kapalıysa arka planı başlat; 3D Atölye açıksa bağla */
const introEl0 = document.getElementById('intro');
if (introEl0 && !introEl0.classList.contains('hide')) introStart();
else bgStartOnce();
if (document.getElementById('v3dBox')) mountViewer();
</script>
