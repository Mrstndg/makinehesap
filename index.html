<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MakineHesap · Makine Elemanları Hesaplama</title>
<meta name="description" content="Makine elemanları ve mekanizmalar için kolay ve şık hesaplama uygulaması." />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#7c3aed" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="MakineHesap" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<style>
  :root {
    --bg: #f2f3fb;
    --bg-soft: #e9ecf9;
    --card: #ffffff;
    --surface: #eef0fa;
    --surface-2: #dde2f3;
    --text: #191d36;
    --text-soft: #4b5378;
    --muted: #8b93b8;
    --primary: #7c3aed;
    --primary-soft: #ede9fe;
    --accent: #06b6d4;
    --success: #10b981;
    --success-soft: #d1fae5;
    --border: #e2e6f5;
    --shadow: 0 1px 3px rgba(23,28,60,.07), 0 14px 40px rgba(23,28,60,.09);
    --radius: 18px;
    --font: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
    --grad: linear-gradient(135deg, #8b5cf6, #22d3ee);
    --glass: rgba(255,255,255,.82);
    --bg3d-op: .35;
  }
  [data-theme="dark"] {
    --card: #141b36;
    --surface: #090d1f;
    --surface-2: #273052;
    --text: #edf0ff;
    --text-soft: #c4cbf0;
    --muted: #7d86b8;
    --primary: #a78bfa;
    --primary-soft: rgba(124,58,237,.3);
    --success-soft: rgba(16,185,129,.16);
    --border: rgba(148,163,255,.16);
    --shadow: 0 1px 3px rgba(0,0,0,.4), 0 18px 50px rgba(0,0,0,.45);
    --glass: rgba(17,23,48,.72);
    --bg3d-op: .95;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background:
      radial-gradient(1200px 600px at 110% -10%, rgba(124,58,237,.16), transparent 60%),
      radial-gradient(1000px 500px at -10% 110%, rgba(34,211,238,.12), transparent 55%),
      var(--surface);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s;
  }
  /* sabit 3D arka plan sahnesi */
  #bg3d {
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none; opacity: var(--bg3d-op);
    transition: opacity .4s;
  }

  /* ---------- Layout ---------- */
  .app { display: grid; grid-template-columns: 270px 1fr; min-height: 100vh; position: relative; z-index: 1; }
  .sidebar {
    background: var(--glass);
    backdrop-filter: blur(18px) saturate(1.35);
    -webkit-backdrop-filter: blur(18px) saturate(1.35);
    border-right: 1px solid var(--border);
    padding: 22px 16px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; padding: 0 6px; }
  .brand .logo {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--grad);
    display: grid; place-items: center; color: #fff; font-size: 22px;
    box-shadow: 0 6px 16px rgba(124,58,237,.35);
  }
  .brand h1 { font-size: 18px; line-height: 1.1; }
  .brand small { color: var(--muted); font-size: 11px; font-weight: 500; }

  .nav-group { margin-bottom: 18px; }
  .nav-group h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 0 8px 8px; font-weight: 700;
  }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 11px; cursor: pointer;
    color: var(--text-soft); font-size: 14.5px; font-weight: 500;
    transition: background .15s, color .15s; user-select: none;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: var(--primary); color: #fff; box-shadow: 0 6px 14px rgba(124,58,237,.3); }
  .nav-item .ico { font-size: 18px; width: 22px; text-align: center; }

  .main { padding: 30px 38px 70px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 26px; gap: 16px; flex-wrap: wrap; }
  .topbar .crumb { color: var(--muted); font-size: 13px; }
  .topbar .crumb b { color: var(--text); }
  .theme-btn {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    padding: 9px 14px; border-radius: 11px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; gap: 8px; font-weight: 600;
  }
  .theme-btn:hover { border-color: var(--primary); }

  /* ---------- Home ---------- */
  .hero {
    position: relative; overflow: hidden;
    background: linear-gradient(130deg, #6d28d9 0%, #7c3aed 35%, #0891b2 100%);
    color: #fff; border-radius: 22px; padding: 38px 40px; margin-bottom: 28px;
    box-shadow: 0 20px 50px rgba(124,58,237,.35);
  }
  .hero::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(340px 200px at 88% 10%, rgba(255,255,255,.18), transparent 65%),
      radial-gradient(280px 200px at 8% 100%, rgba(34,211,238,.25), transparent 60%);
  }
  .hero h2 { font-size: 30px; margin-bottom: 8px; position: relative; letter-spacing: -.4px; }
  .hero p { opacity: .93; font-size: 15px; max-width: 660px; line-height: 1.55; position: relative; }
  .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; position: relative; }
  .hero-actions button {
    border: none; cursor: pointer; font-family: var(--font); font-weight: 800; font-size: 14px;
    padding: 11px 18px; border-radius: 12px; transition: transform .15s, filter .15s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .hero-actions button:hover { transform: translateY(-2px); filter: brightness(1.06); }
  .hero-actions .ha-solid { background: #fff; color: #6d28d9; box-shadow: 0 8px 22px rgba(0,0,0,.22); }
  .hero-actions .ha-ghost { background: rgba(255,255,255,.14); color: #fff; border: 1px solid rgba(255,255,255,.3); }
  .hero-stats { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 16px; position: relative; }
  .hero-stats span { font-size: 12.5px; font-weight: 700; opacity: .9; display: flex; align-items: center; gap: 6px; }

  /* ---------- Konu özeti ---------- */
  .topic {
    background: var(--glass); border: 1px solid var(--border); border-radius: 14px;
    margin-bottom: 20px; overflow: hidden;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  }
  .topic summary {
    cursor: pointer; padding: 15px 18px; font-weight: 800; font-size: 14px; color: var(--text);
    list-style: none; display: flex; align-items: center; gap: 9px; user-select: none;
  }
  .topic summary::-webkit-details-marker { display: none; }
  .topic summary::after { content: '▾'; margin-left: auto; color: var(--muted); transition: transform .2s; }
  .topic[open] summary::after { transform: rotate(180deg); }
  .topic .topic-body { padding: 0 18px 16px; color: var(--text-soft); font-size: 14px; line-height: 1.75; }
  .topic .topic-body b { color: var(--text); }

  /* ---------- Sınav modu ---------- */
  .quiz-score { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .quiz-score .pill {
    background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
    padding: 7px 14px; font-size: 13px; font-weight: 700; color: var(--text-soft);
  }
  .quiz-score .pill b { color: var(--primary); }
  .quiz-q {
    background: var(--primary-soft); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px; font-size: 15.5px; line-height: 1.6; margin-bottom: 16px; color: var(--text);
  }
  .quiz-q b { color: var(--primary); }
  .quiz-given { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .quiz-given .qg {
    background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 10px 13px;
  }
  .quiz-given .qg small { display: block; color: var(--muted); font-size: 11.5px; font-weight: 700; margin-bottom: 3px; }
  .quiz-given .qg span { font-size: 16px; font-weight: 800; color: var(--text); }
  .quiz-given .qg span i { font-style: normal; font-size: 12px; color: var(--muted); font-weight: 600; }
  .quiz-answer { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .quiz-answer input {
    width: 170px; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px;
    background: var(--surface); color: var(--text); font-size: 17px; font-weight: 700; font-family: var(--font);
  }
  .quiz-answer input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .quiz-answer .unit { font-weight: 800; color: var(--text-soft); }
  .quiz-fb { font-weight: 800; font-size: 15.5px; margin-bottom: 10px; min-height: 22px; }
  .quiz-fb.ok { color: var(--success); }
  .quiz-fb.no { color: #f43f5e; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
  .tile {
    background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px; cursor: pointer; box-shadow: var(--shadow);
    transition: transform .15s, border-color .15s, box-shadow .2s;
    backdrop-filter: blur(16px) saturate(1.3);
    -webkit-backdrop-filter: blur(16px) saturate(1.3);
  }
  .tile:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 18px 44px rgba(124,58,237,.22); }
  .tile .ico { font-size: 30px; margin-bottom: 12px; display: block; }
  .tile h3 { font-size: 16.5px; margin-bottom: 6px; }
  .tile p { color: var(--text-soft); font-size: 13px; line-height: 1.45; }

  /* ---------- Calculator ---------- */
  .calc-head { margin-bottom: 22px; }
  .calc-head h2 { font-size: 24px; display: flex; align-items: center; gap: 12px; }
  .calc-head .ico { font-size: 28px; }
  .calc-head p { color: var(--text-soft); margin-top: 6px; font-size: 14px; max-width: 720px; line-height: 1.5; }

  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .card {
    background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; box-shadow: var(--shadow);
    backdrop-filter: blur(16px) saturate(1.3);
    -webkit-backdrop-filter: blur(16px) saturate(1.3);
  }
  .card h3 { font-size: 15px; margin-bottom: 18px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .card h3 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--text-soft); margin-bottom: 6px; font-weight: 600; }
  .field .hint { color: var(--muted); font-weight: 400; }
  .input-wrap { position: relative; display: flex; align-items: center; }
  .field input, .field select {
    width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 11px;
    background: var(--surface); color: var(--text); font-size: 15px; font-family: var(--font);
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .field .unit {
    position: absolute; right: 12px; color: var(--muted); font-size: 13px; font-weight: 600; pointer-events: none;
  }
  .field input { padding-right: 48px; }

  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .btn {
    flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer;
    font-size: 15px; font-weight: 700; font-family: var(--font); transition: transform .1s, filter .15s;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--grad); color: #fff; box-shadow: 0 8px 18px rgba(124,58,237,.3); }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-ghost { background: var(--surface); color: var(--text-soft); flex: 0 0 auto; padding: 12px 16px; }
  .btn-ghost:hover { background: var(--surface-2); }

  /* ---------- Results ---------- */
  .results .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 40px 10px; line-height: 1.6; }
  .result-row {
    display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
    padding: 14px 0; border-bottom: 1px dashed var(--border);
  }
  .result-row:last-child { border-bottom: none; }
  .result-row .r-label { font-size: 14px; color: var(--text-soft); }
  .result-row .r-label small { display: block; color: var(--muted); font-size: 11.5px; font-family: ui-monospace, monospace; margin-top: 3px; }
  .result-row .r-val { font-size: 19px; font-weight: 800; color: var(--text); white-space: nowrap; }
  .result-row .r-val span { font-size: 13px; color: var(--muted); font-weight: 600; margin-left: 3px; }
  .result-row.highlight { background: var(--success-soft); margin: 0 -12px; padding: 14px 12px; border-radius: 11px; border: none; }
  [data-theme="dark"] .result-row.highlight { background: rgba(22,163,74,.15); }
  .result-row.highlight .r-val { color: var(--success); }

  .formula-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-top: 18px; font-family: ui-monospace, 'Cascadia Code', monospace;
    font-size: 13px; color: var(--text-soft); line-height: 1.9; overflow-x: auto;
  }
  .formula-box .ftitle { font-family: var(--font); font-weight: 700; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .err { background: #fef2f2; color: #b91c1c; padding: 12px 14px; border-radius: 11px; font-size: 13.5px; border: 1px solid #fecaca; }
  [data-theme="dark"] .err { background: rgba(185,28,28,.15); border-color: rgba(185,28,28,.4); color: #fca5a5; }

  /* ---------- Kumpas (caliper) ---------- */
  .k-wrap { display: grid; grid-template-columns: 1fr; gap: 18px; }
  .k-controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .k-seg { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 4px; gap: 4px; }
  .k-seg button { border: none; background: transparent; color: var(--text-soft); padding: 8px 13px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13.5px; font-family: var(--font); }
  .k-seg button.on { background: var(--primary); color: #fff; box-shadow: 0 4px 10px rgba(124,58,237,.3); }
  .k-readout { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .k-readout .big { font-size: 40px; font-weight: 800; font-family: ui-monospace, monospace; color: var(--primary); letter-spacing: .5px; }
  .k-readout .big.hidden { color: var(--muted); }
  .k-readout .lbl { font-size: 13px; color: var(--muted); font-weight: 600; }
  .k-svg-box { width: 100%; overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px; touch-action: none; }
  .k-svg-box svg { width: 100%; min-width: 640px; height: auto; display: block; user-select: none; }
  .k-range { width: 100%; accent-color: var(--primary); height: 26px; }
  .k-break { font-family: ui-monospace, monospace; font-size: 13.5px; color: var(--text-soft); line-height: 1.8; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .k-break b { color: var(--text); }
  .k-answer { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .k-answer input { width: 150px; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 11px; background: var(--surface); color: var(--text); font-size: 16px; font-family: var(--font); }
  .k-answer input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .k-feedback { font-weight: 700; font-size: 15px; padding: 6px 0; }
  .k-feedback.ok { color: var(--success); }
  .k-feedback.no { color: #dc2626; }
  .k-hint { font-size: 13px; color: var(--muted); line-height: 1.6; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; display: none; }
    .sidebar.open { display: block; }
    .main { padding: 20px; }
    .panels { grid-template-columns: 1fr; }
    .menu-toggle { display: flex !important; }
    .v3d-box { height: 340px; }
  }
  .menu-toggle { display: none; }

  /* ---------- Ekran Cetveli ---------- */
  .cet-hint { font-size: 13px; color: var(--muted); line-height: 1.6; margin: 10px 0; }
  .cet-lbl { font-size: 13.5px; color: var(--text-soft); font-weight: 600; }
  .cet-input { width: 130px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text); font-size: 15px; font-family: var(--font); }
  .cet-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .cet-stage { display: flex; justify-content: center; align-items: center; min-height: 130px; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; margin: 14px 0; padding: 14px; overflow: auto; }
  .cet-shape-card { background: linear-gradient(135deg, #334155, #64748b); border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,.28); flex: 0 0 auto; }
  .cet-shape-coin { background: radial-gradient(circle at 35% 32%, #fde68a, #d97706 70%); border-radius: 50%; box-shadow: 0 8px 20px rgba(0,0,0,.28); flex: 0 0 auto; }
  .cet-read { text-align: center; font-size: 14px; color: var(--text-soft); margin-bottom: 12px; }
  .cet-readout { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
  .cet-readout .big { font-size: 40px; font-weight: 800; font-family: ui-monospace, monospace; color: var(--primary); }
  .cet-readout .lbl { font-size: 14px; color: var(--muted); font-weight: 600; }
  .cet-strip { position: relative; height: 150px; background: repeating-linear-gradient(90deg, var(--surface), var(--surface) 9px, var(--surface-2) 9px, var(--surface-2) 10px); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; touch-action: none; margin-bottom: 8px; }
  .cet-ruler { position: absolute; inset: 0; pointer-events: none; }
  .cet-tick { position: absolute; top: 0; width: 1px; background: var(--text-soft); }
  .cet-num { position: absolute; top: 22px; transform: translateX(-50%); font-size: 11px; color: var(--text-soft); font-weight: 700; pointer-events: none; }
  .cet-region { position: absolute; top: 0; bottom: 0; background: rgba(124,58,237,.14); pointer-events: none; }
  .cet-handle { position: absolute; top: 0; bottom: 0; width: 24px; margin-left: -12px; cursor: ew-resize; touch-action: none; z-index: 3; }
  .cet-handle::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; margin-left: -1px; background: #ef4444; }
  .cet-handle span { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 28px; border-radius: 50%; background: #ef4444; box-shadow: 0 3px 8px rgba(0,0,0,.35); border: 2px solid #fff; }

  /* ---------- Günün Şarkısı ---------- */
  .song-card {
    background: linear-gradient(135deg, #7c3aed, #db2777);
    color: #fff; border-radius: var(--radius); padding: 20px 24px; margin-bottom: 14px;
    box-shadow: 0 16px 40px rgba(124,58,237,.32);
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .song-card .disc {
    width: 60px; height: 60px; border-radius: 50%; flex: 0 0 auto;
    background: rgba(255,255,255,.16); display: grid; place-items: center; font-size: 28px;
    box-shadow: inset 0 0 0 4px rgba(255,255,255,.18); animation: discSpin 7s linear infinite;
  }
  @keyframes discSpin { to { transform: rotate(360deg); } }
  .song-info { flex: 1; min-width: 200px; }
  .song-eyebrow { font-size: 11.5px; text-transform: uppercase; letter-spacing: .12em; font-weight: 800; opacity: .9; }
  .song-card h3 { font-size: 22px; margin: 5px 0 2px; }
  .song-artist { font-size: 15px; opacity: .92; font-weight: 600; }
  .song-meta { font-size: 12px; opacity: .82; margin-top: 8px; }
  .song-btn {
    background: #fff; color: #7c3aed; border: none; border-radius: 12px; padding: 12px 22px;
    font-weight: 800; font-size: 15px; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px; transition: transform .15s, filter .15s; flex: 0 0 auto;
  }
  .song-btn:hover { transform: translateY(-2px); filter: brightness(1.04); }
  .song-player { margin-bottom: 28px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .song-player iframe { width: 100%; height: 200px; display: block; border: 0; }

  /* ---------- Ana sayfa arama ---------- */
  .home-search { position: relative; margin-bottom: 18px; }
  .home-search .hs-ico { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: .6; pointer-events: none; }
  .home-search input {
    width: 100%; padding: 14px 16px 14px 44px; border: 1.5px solid var(--border); border-radius: 14px;
    background: var(--card); color: var(--text); font-size: 15.5px; font-family: var(--font); box-shadow: var(--shadow);
  }
  .home-search input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .grid-empty { text-align: center; color: var(--muted); padding: 36px; font-size: 15px; }

<script>
/* =========================================================================
   MakineHesap — Makine Elemanları & Mekanizmalar Hesaplama Uygulaması
   Yeni hesap eklemek için: aşağıdaki CALCS nesnesine yeni bir kayıt ekle.
   ========================================================================= */

const PI = Math.PI;
const fmt = (x, d = 2) => {
  if (x === null || x === undefined || Number.isNaN(x)) return '—';
  return Number(x).toLocaleString('tr-TR', { maximumFractionDigits: d, minimumFractionDigits: 0 });
};

/* ---- Hesaplayıcı tanımları ---- */
const CALCS = {

  sim3d: {
    ico: '🧊', cat: '3D Atölye',
    title: '3D Mekanizma Atölyesi',
    desc: 'Makine elemanlarını gerçek 3 boyutlu ortamda incele: dişli çarklar, kayış–kasnak, zincir, rulman, yay ve civata–somun. Parmağınla/fareyle sürükleyip döndür, tekerlekle yakınlaştır, çalışmasını izle.',
    custom: true,
    render: () => v3dHTML(),
    init: () => v3dInit(),
  },

  sinav: {
    ico: '🎯', cat: '3D Atölye',
    title: 'Sınav Modu',
    desc: 'Kendini dene! Uygulama sana rastgele değerlerle gerçekçi bir soru sorar; sen hesaplarsın, o kontrol eder. Yanlışsa adım adım çözümü gösterir. Sınava hazırlanmanın en hızlı yolu.',
    custom: true,
    render: () => quizHTML(),
    init: () => quizInit(),
  },

  kayis: {
    ico: '🛞', cat: 'Güç İletimi',
    title: 'Kayış–Kasnak Mekanizması',
    desc: 'Döndüren kasnağın devrinden hareketle döndürülen kasnağın devrini, kayış hızını, iletim oranını ve kayış uzunluğunu hesaplar.',
    notes: `Kayış–kasnak mekanizmaları, iki mil arasında gücü <b>sürtünme</b> yoluyla iletir. Küçük kasnak hızlı, büyük kasnak yavaş döner: çevre hızları eşit olduğu için <b>n₁·dm₁ = n₂·dm₂</b> yazılır. Sessiz çalışır, darbeleri yumuşatır ve ucuzdur; ama kayma olabileceğinden iletim oranı kesin değildir. Açık kayışta kasnaklar aynı yönde, çapraz kayışta zıt yönde döner. Kayış hızı tüm kayış boyunca aynıdır — bu yüzden V formülü hangi kasnaktan hesaplanırsa hesaplansın aynı çıkar. 🧊 3D Atölye'de çalışan halini izleyebilirsin.`,
    inputs: [
      { id: 'n1',  label: 'Döndüren kasnak devri', sub: 'n₁', unit: 'd/dak', def: 1600 },
      { id: 'dm1', label: 'Döndüren kasnak çapı',   sub: 'dm₁', unit: 'mm', def: 123.8 },
      { id: 'dm2', label: 'Döndürülen kasnak çapı', sub: 'dm₂', unit: 'mm', def: 198.8 },
      { id: 'a',   label: 'Eksenler arası mesafe',  sub: 'a', unit: 'mm', def: 750 },
    ],
    compute: (v) => {
      const n2 = v.n1 * v.dm1 / v.dm2;
      const i  = v.dm2 / v.dm1;
      const V  = (PI * v.dm1 * v.n1) / (1000 * 60);
      const Lm = 2*v.a + 1.57*(v.dm1+v.dm2) + Math.pow(v.dm2-v.dm1,2)/(4*v.a);
      return {
        rows: [
          { label: 'Döndürülen kasnak devri', sub: 'n₂ = n₁·dm₁/dm₂', val: fmt(n2), unit: 'd/dak', hi: true },
          { label: 'İletim oranı',             sub: 'i = dm₂/dm₁', val: fmt(i,3), unit: '' },
          { label: 'Kayış hızı',               sub: 'V = π·dm₁·n₁/(1000·60)', val: fmt(V), unit: 'm/s', hi: true },
          { label: 'Kayış uzunluğu',           sub: 'Lm', val: fmt(Lm), unit: 'mm', hi: true },
        ],
        formula: [
          'n₂ = n₁ · dm₁ / dm₂',
          'V  = π · dm₁ · n₁ / (1000 · 60)   [m/s]',
          'Lm = 2·a + 1.57·(dm₁+dm₂) + (dm₂−dm₁)² / (4·a)',
        ]
      };
    }
  },

  disli: {
    ico: '⚙️', cat: 'Güç İletimi',
    title: 'Silindirik Düz Dişli Çark',
    desc: 'Modül ve diş sayısından dişli çarkın taksimat, diş üstü ve diş dibi çapını hesaplar. İstersen karşılık dişlisini de girerek eksenler arası mesafe ve iletim oranını bulabilirsin.',
    notes: `Dişli çarklar gücü <b>kaymasız ve kesin oranla</b> iletir. Her şeyin anahtarı <b>modül (m)</b>'dür: dişin büyüklüğünü belirler ve <b>birbirine çalışan iki dişlinin modülü aynı olmak zorundadır</b>. Taksimat dairesi (d₀ = m·z) iki dişlinin birbirine "değdiği" hayali dairedir; diş üstü çapı ondan 2m büyük, diş dibi çapı 2.5m küçüktür. Küçük dişliye <b>pinyon</b> denir. İletim oranı diş sayılarıyla bulunur: i = z₂/z₁. Dıştan kavraşan iki dişli zıt yönde döner.`,
    inputs: [
      { id: 'm',  label: 'Modül', sub: 'm', unit: 'mm', def: 3 },
      { id: 'z1', label: 'Diş sayısı', sub: 'z₁', unit: 'adet', def: 20 },
      { id: 'z2', label: 'Karşılık diş sayısı (isteğe bağlı)', sub: 'z₂', unit: 'adet', def: '' },
      { id: 'a',  label: 'Eksenler arası mesafe (isteğe bağlı)', sub: 'a (z₂ boşsa buradan z₂ bulunur)', unit: 'mm', def: '' },
    ],
    compute: (v) => {
      const m = v.m, z1 = v.z1;
      const d01 = m * z1;                          // taksimat çapı
      const da1 = d01 + 2 * m;                      // diş üstü çapı
      const df1 = d01 - 2.5 * m;                    // diş dibi çapı
      const t   = PI * m;                           // taksimat (hatve)
      const h   = 2.25 * m;                         // diş yüksekliği
      const rows = [
        { label: 'Taksimat çapı', sub: 'd₀ = m · z', val: fmt(d01), unit: 'mm' },
        { label: 'Diş üstü çapı', sub: 'da = d₀ + 2·m', val: fmt(da1), unit: 'mm', hi: true },
        { label: 'Diş dibi çapı', sub: 'df = d₀ − 2.5·m', val: fmt(df1), unit: 'mm', hi: true },
        { label: 'Diş yüksekliği', sub: 'h = 2.25·m', val: fmt(h), unit: 'mm' },
        { label: 'Taksimat (hatve)', sub: 't = π·m', val: fmt(t), unit: 'mm' },
      ];
      const hasZ2 = (typeof v.z2 === 'number') && v.z2 > 0;
      const hasA  = (typeof v.a  === 'number') && v.a  > 0;
      if (hasZ2 || hasA) {
        let z2, fromA = false;
        if (hasZ2) { z2 = v.z2; } else { z2 = (2 * v.a - d01) / m; fromA = true; }
        const d02 = m * z2;
        const a   = (d01 + d02) / 2;
        const i   = z2 / z1;
        rows.push({ label: 'Karşılık diş sayısı', sub: fromA ? 'z₂ = (2a − d₀₁)/m' : 'verildi', val: fmt(z2, 2), unit: 'adet', hi: fromA });
        rows.push({ label: 'Karşılık taksimat çapı', sub: 'd₀₂ = m·z₂', val: fmt(d02), unit: 'mm' });
        rows.push({ label: 'Eksenler arası mesafe', sub: 'a = (d₀₁+d₀₂)/2', val: fmt(a), unit: 'mm', hi: !fromA });
        rows.push({ label: 'İletim oranı', sub: 'i = z₂/z₁', val: fmt(i, 3), unit: '' });
      }
      return {
        rows,
        formula: [
          'd₀ = m · z              (taksimat dairesi çapı)',
          'da = d₀ + 2·m           (diş üstü çapı)',
          'df = d₀ − 2.5·m         (diş dibi çapı)',
          'h = 2.25·m   ·   t = π·m   ·   a = (d₀₁+d₀₂)/2',
        ]
      };
    }
  },

  zincir: {
    ico: '🔗', cat: 'Güç İletimi',
    title: 'Zincir Dişli Çark',
    desc: 'Zincir adımı, makara çapı ve diş sayısından zincir dişli çark elemanlarını hesaplar. Çok sıralı zincirler için sıra genişliklerini de verir.',
    notes: `Zincir mekanizmaları, kayışın <b>kaymasız</b> alternatifidir: bisiklet ve motosikletteki gibi. Güç, zincir baklalarının dişlere <b>şekil bağıyla</b> takılmasıyla iletilir; bu yüzden iletim oranı kesindir. En önemli büyüklük <b>adım (p)</b> — iki makara merkezi arasındaki mesafedir. Taksimat çapı düz dişlideki gibi çarpımla değil, <b>d₀ = p / sin(180°/z)</b> ile bulunur çünkü zincir dişliye çokgen gibi oturur. Yüksek güçte tek sıra yetmezse 2–3 sıralı zincir kullanılır.`,
    inputs: [
      { id: 'p',  label: 'Zincir adımı', sub: 'p', unit: 'mm', def: 9.525 },
      { id: 'z',  label: 'Diş sayısı', sub: 'z', unit: 'adet', def: 20 },
      { id: 'd1', label: 'Makara çapı', sub: 'd₁', unit: 'mm', def: 6.35 },
      { id: 'b1', label: 'Zincir ara genişliği', sub: 'b₁', unit: 'mm', def: 5.72 },
      { id: 'e',  label: 'Sıralar arası mesafe', sub: 'e (tek sıra için 0)', unit: 'mm', def: 10.1 },
    ],
    compute: (v) => {
      const ang = PI / v.z;          // 180/z radyan
      const d0  = v.p / Math.sin(ang);
      const da  = d0 * Math.cos(ang) + 0.8 * v.d1;
      const df  = d0 - v.d1;
      const B1  = 0.91 * v.b1;
      const B2  = B1 + v.e;
      const B3  = B2 + v.e;
      const rows = [
        { label: 'Taksimat çapı', sub: 'd₀ = p / sin(180/z)', val: fmt(d0), unit: 'mm', hi: true },

  helisel: {
    ico: '🦷', cat: 'Güç İletimi',
    title: 'Helisel Dişli Çark',
    desc: 'Normal modül, diş sayıları ve helis açısından alın modülü, taksimat çapları, eksenler arası mesafe ve iletim oranını hesaplar.',
    notes: `Helisel dişlilerde dişler mile paralel değil, <b>β helis açısıyla eğik</b> açılır. Böylece dişler kavramaya kademeli girer: düz dişliye göre <b>daha sessiz, daha yumuşak</b> çalışır ve daha çok güç taşır — otomobil şanzımanları bu yüzden heliseldir. Bedeli, mili iten bir <b>eksenel kuvvet</b> doğurmasıdır (yataklar buna göre seçilir). Diş ölçüleri normal modülle (mₙ), çap hesapları ise alın modülüyle (mₜ = mₙ/cos β) yapılır. Birlikte çalışan çiftte biri sağ, diğeri sol helistir.`,
    inputs: [
      { id: 'mn',   label: 'Normal modül', sub: 'mₙ', unit: 'mm', def: 3 },
      { id: 'z1',   label: 'Pinyon diş sayısı', sub: 'z₁', unit: 'adet', def: 20 },
      { id: 'z2',   label: 'Karşılık diş sayısı', sub: 'z₂', unit: 'adet', def: 40 },
      { id: 'beta', label: 'Helis açısı', sub: 'β', unit: '°', def: 15 },
    ],
    compute: (v) => {
      const b   = v.beta * PI / 180;
      const cb  = Math.cos(b);
      const mt  = v.mn / cb;                 // alın modülü
      const d01 = v.mn * v.z1 / cb;
      const d02 = v.mn * v.z2 / cb;
      const a   = v.mn * (v.z1 + v.z2) / (2 * cb);
      const i   = v.z2 / v.z1;
      const da1 = d01 + 2 * v.mn;            // diş üstü (pinyon)
      const df1 = d01 - 2.5 * v.mn;          // diş dibi (pinyon)
      const pn  = PI * v.mn;                 // normal hatve
      const pt  = PI * mt;                   // alın hatve
      return {
        rows: [
          { label: 'Alın modülü', sub: 'mₜ = mₙ / cos β', val: fmt(mt,3), unit: 'mm', hi: true },
          { label: 'Taksimat çapı (pinyon)', sub: 'd₀₁ = mₙ·z₁ / cos β', val: fmt(d01), unit: 'mm' },
          { label: 'Taksimat çapı (karşılık)', sub: 'd₀₂ = mₙ·z₂ / cos β', val: fmt(d02), unit: 'mm' },
          { label: 'Eksenler arası mesafe', sub: 'a = mₙ·(z₁+z₂) / (2·cos β)', val: fmt(a), unit: 'mm', hi: true },
          { label: 'İletim oranı', sub: 'i = z₂/z₁', val: fmt(i,3), unit: '' },
          { label: 'Diş üstü çapı (pinyon)', sub: 'da₁ = d₀₁ + 2mₙ', val: fmt(da1), unit: 'mm' },
          { label: 'Diş dibi çapı (pinyon)', sub: 'df₁ = d₀₁ − 2.5mₙ', val: fmt(df1), unit: 'mm' },
          { label: 'Normal hatve', sub: 'pₙ = π·mₙ', val: fmt(pn), unit: 'mm' },
          { label: 'Alın hatvesi', sub: 'pₜ = π·mₜ', val: fmt(pt), unit: 'mm' },
        ],
        formula: [
          'mₜ = mₙ / cos β            (alın modülü)',
          'd₀ = mₙ · z / cos β        (taksimat çapı)',
          'a  = mₙ·(z₁+z₂) / (2·cos β)',
          'da = d₀ + 2mₙ  ·  df = d₀ − 2.5mₙ',
        ]
      };
    }
  },

  yatak: {
    ico: '⭕', cat: 'Makine Elemanları',
    title: 'Rulman Ömrü (L₁₀)',
    desc: 'Dinamik yük sayısı (C), eşdeğer yatak yükü (P) ve devirden rulmanın ömrünü milyon devir ve saat olarak hesaplar.',
    notes: `Rulmanlar (yuvarlanmalı yataklar), dönen mili <b>kaymalı sürtünme yerine yuvarlanmayla</b> destekler: iç bilezik, dış bilezik ve aralarındaki bilyeler/makaralardan oluşur. <b>C (dinamik yük sayısı)</b> katalogdan okunan, rulmanın taşıma kapasitesini gösteren değerdir. Ömür formülündeki üs, bilyeli rulmanda 3, makaralı rulmanda 10/3'tür. <b>L₁₀</b> "aynı rulmanların %90'ının dayandığı ömür" demektir. Yük (P) yarıya inerse bilyeli rulmanın ömrü 2³ = <b>8 kat</b> artar!`,
    inputs: [
      { id: 'C', label: 'Dinamik yük sayısı', sub: 'C (katalogdan)', unit: 'N', def: 14700 },
      { id: 'P', label: 'Eşdeğer yatak yükü', sub: 'P', unit: 'N', def: 3000 },
      { id: 'n', label: 'Devir sayısı', sub: 'n', unit: 'd/dak', def: 1500 },
      { id: 'p', label: 'Rulman tipi', sub: 'üs p', type: 'select', def: 3,
        options: [ { v: 3, t: 'Bilyeli rulman (p = 3)' }, { v: 3.3333, t: 'Makaralı rulman (p = 10/3)' } ] },
    ],
    compute: (v) => {
      const ratio = v.C / v.P;
      const L10 = Math.pow(ratio, v.p);          // milyon devir
      const Lh  = (1e6 / (60 * v.n)) * L10;       // saat
      const Lyil = Lh / (8 * 300);                // ~yıl (8 saat/gün, 300 gün)
      return {
        rows: [
          { label: 'Yük oranı', sub: 'C / P', val: fmt(ratio,2), unit: '' },
          { label: 'Ömür', sub: 'L₁₀ = (C/P)^p', val: fmt(L10,1), unit: 'milyon devir', hi: true },
          { label: 'Ömür (saat)', sub: 'Lₕ = 10⁶/(60·n) · L₁₀', val: fmt(Lh,0), unit: 'saat', hi: true },
          { label: 'Ömür (yıl)', sub: '≈ Lₕ / (8 saat · 300 gün)', val: fmt(Lyil,1), unit: 'yıl' },
        ],
        formula: [
          'L₁₀ = (C / P)^p           [milyon devir]',
          'p = 3 (bilyeli)  ·  p = 10/3 (makaralı)',
          'Lₕ = 10⁶ / (60·n) · L₁₀   [saat]',
          'P = eşdeğer dinamik yük (radyal için P ≈ Fr)',
        ]
      };
    }
  },

  civata: {
    ico: '🔩', cat: 'Bağlama Elemanları',
    title: 'Civata Mukavemeti',
    desc: 'Eksenel kuvvet altındaki civatanın çekme gerilmesini, gerekli en küçük çapı ve sıkma momentini hesaplar.',
    notes: `Civatalar en yaygın <b>sökülebilir</b> bağlama elemanıdır. Çekme yükünde tehlikeli kesit, dişlerin inceltiği <b>diş dibi çapıdır</b> — hesap bu çapla yapılır. Kural basittir: oluşan gerilme, emniyet gerilmesini aşmamalı (σ = F/A ≤ σₑₘ). Emniyet gerilmesi, malzemenin dayanımının bir <b>emniyet katsayısına</b> bölünmesiyle bulunur. Sıkma momenti M ≈ 0.2·F·d pratik formülüyle tahmin edilir; kritik bağlantılarda tork anahtarıyla sıkılır. 🧊 3D Atölye'de somunun vida üzerinde ilerleyişini izle.`,
    inputs: [
      { id: 'F',    label: 'Eksenel (çekme) kuvveti', sub: 'F', unit: 'N', def: 10000 },
      { id: 'd',    label: 'Hesap çapı (diş dibi)', sub: 'd', unit: 'mm', def: 12 },
      { id: 'sem',  label: 'Emniyet gerilmesi', sub: 'σₑₘ', unit: 'N/mm²', def: 80 },
    ],
    compute: (v) => {
      const A     = PI * v.d * v.d / 4;
      const sigma = v.F / A;                          // çekme gerilmesi

      const ok    = sigma <= v.sem;
      return {
        rows: [
          { label: 'Hesap kesiti', sub: 'A = π·d²/4', val: fmt(A), unit: 'mm²' },
          { label: 'Çekme gerilmesi', sub: 'σ = F / A', val: fmt(sigma,1), unit: 'N/mm²', hi: true },
          { label: 'Durum', sub: 'σ ≤ σₑₘ ?', val: ok ? 'Güvenli ✓' : 'GÜVENSİZ ✗', unit: '', hi: true },
          { label: 'Gerekli en küçük çap', sub: 'd ≥ √(4F / π·σₑₘ)', val: fmt(dmin,2), unit: 'mm', hi: true },
          { label: 'Sıkma momenti', sub: 'M ≈ 0.2·F·d', val: fmt(M,1), unit: 'N·m' },
        ],
        formula: [
          'A = π · d² / 4            (hesap kesiti)',
          'σ = F / A ≤ σₑₘ           (çekme kontrolü)',
          'd_min = √(4·F / (π·σₑₘ))',
          'M ≈ 0.2 · F · d           (sıkma momenti)',
        ]
      };
    }
  },

  kama: {
    ico: '🗝️', cat: 'Bağlama Elemanları',
    title: 'Kama Bağlantısı',
    desc: 'Döndürme momentini ileten kamanın çevresel kuvvetini, kesme ve ezilme gerilmelerini hesaplar.',
    notes: `Kama, mil ile göbek (dişli, kasnak vb.) arasında <b>momenti ileten</b> küçük ama kritik parçadır: mildeki ve göbekteki yuvalara oturur. Moment, mil yüzeyinde çevresel kuvvete dönüşür: <b>F = 2·Mt/d</b> (moment = kuvvet × yarıçap'tan gelir). Kama iki şekilde zorlanır: gövdesi ortadan <b>kesilmeye</b> (τ), yan yüzeyleri <b>ezilmeye</b> (σₑ) çalışır — ikisi de emniyet değerinin altında kalmalıdır. Genişlik ve yükseklik standart tablodan (DIN 6885) mil çapına göre seçilir, hesapla sadece <b>boy</b> kontrol edilir.`,
    inputs: [
      { id: 'Mt', label: 'Döndürme momenti', sub: 'Mt', unit: 'N·mm', def: 120000 },
      { id: 'd',  label: 'Mil çapı', sub: 'd', unit: 'mm', def: 40 },
      { id: 'b',  label: 'Kama genişliği', sub: 'b', unit: 'mm', def: 12 },
      { id: 'h',  label: 'Kama yüksekliği', sub: 'h', unit: 'mm', def: 8 },
      { id: 'l',  label: 'Kama boyu', sub: 'l', unit: 'mm', def: 56 },
    ],
    compute: (v) => {
      const F     = 2 * v.Mt / v.d;          // çevresel kuvvet

      return {

          { label: 'Çevresel kuvvet', sub: 'F = 2·Mt / d', val: fmt(F,0), unit: 'N', hi: true },
          { label: 'Kesme gerilmesi', sub: 'τ = F / (b·l)', val: fmt(tau,2), unit: 'N/mm²', hi: true },
          { label: 'Ezilme gerilmesi', sub: 'σₑ = 2F / (h·l)', val: fmt(sigez,2), unit: 'N/mm²', hi: true },
        ],
        formula: [
          'F  = 2 · Mt / d           (çevresel kuvvet)',
          'τ  = F / (b · l)          (kesme)',
          'σₑ = 2·F / (h · l)        (ezilme)',
        ]
      };
    }
  },

  asansor: {
    ico: '🛗', cat: 'Taşıma Sistemleri',
    title: 'Asansör Motor Gücü',
    desc: 'Motor tahrikli redüktörlü asansörde kabin yükü, halat ve karşı ağırlıktan dengelenmemiş kuvveti ve gerekli motor gücünü hesaplar.',
    notes: `Asansörün püf noktası <b>karşı ağırlıktır</b>: kabin + yükün yarısı kadar seçilir (Ga = Gk + Gy/2). Böylece motor tüm kabini değil, sadece <b>dengelenmemiş kısmı</b> kaldırır — bu da enerji tasarrufu demektir. Kalan dengesiz yük yerçekimiyle kuvvete (F = m·g), kuvvet de hızla çarpılıp verime bölünerek güce dönüşür: <b>P = F·V/η</b>. Verim (η) redüktör, makara ve sürtünme kayıplarını içerir; redüktörlü sistemlerde 0.4–0.6 gibi düşük değerler normaldir.`,
    inputs: [
      { id: 'kisi',  label: 'Kapasite (kişi sayısı)', sub: 'n', unit: 'kişi', def: 6 },
      { id: 'gkisi', label: 'Kişi başına ağırlık', sub: '', unit: 'kg', def: 80 },
      { id: 'Gk',    label: 'Kabin ağırlığı', sub: 'Gk', unit: 'kg', def: 500 },
      { id: 'roh',   label: 'Halat birim ağırlığı', sub: 'ρh', unit: 'kg/m', def: 0.51 },
      { id: 'Lh',    label: 'Halat uzunluğu', sub: 'Lh', unit: 'm', def: 26 },
      { id: 'nh',    label: 'Halat sayısı', sub: 'nh', unit: 'adet', def: 4 },
      { id: 'V',     label: 'Kabin hızı', sub: 'V', unit: 'm/s', def: 0.63 },
      { id: 'eta',   label: 'Verim', sub: 'η', unit: '', def: 0.45 },
    ],
    compute: (v) => {
      const g  = 9.81;
      const Gy = v.kisi * v.gkisi;            // kabin yükü
      const Gh = v.roh * v.Lh * v.nh;         // halat ağırlığı
      const Ga = v.Gk + Gy / 2;               // karşı ağırlık
      const Fkg = v.Gk + Gy + Gh - Ga;        // dengelenmemiş yük (= Gy/2 + Gh)
      const Fn  = Fkg * g;                     // kuvvet [N]
      const P   = Fn * v.V / v.eta;            // güç [W]
      return {
        rows: [
          { label: 'Kabin yükü', sub: 'Gy = n · (kişi ağ.)', val: fmt(Gy, 0), unit: 'kg' },
          { label: 'Halat ağırlığı', sub: 'Gh = ρh · Lh · nh', val: fmt(Gh, 2), unit: 'kg' },
          { label: 'Karşı ağırlık', sub: 'Ga = Gk + Gy/2', val: fmt(Ga, 0), unit: 'kg' },
          { label: 'Dengelenmemiş yük', sub: 'F = Gk + Gy + Gh − Ga', val: fmt(Fkg, 2), unit: 'kg' },
          { label: 'Kuvvet', sub: 'F = m · g', val: fmt(Fn, 1), unit: 'N', hi: true },
          { label: 'Motor gücü', sub: 'P = F · V / η', val: fmt(P, 0), unit: 'W', hi: true },
          { label: 'Motor gücü', sub: '≈', val: fmt(P / 1000, 2), unit: 'kW', hi: true },
        ],
        formula: [
          'Gy = n · (kişi ağırlığı)     ·   Gh = ρh · Lh · nh',
          'Ga = Gk + Gy/2               (karşı ağırlık)',
          'F  = (Gk + Gy + Gh − Ga) · g [N]',
          'P  = F · V / η               [W]',
        ]
      };
    }
  },

      { id: 'Q',  label: 'Hedef dozaj', sub: 'Q', unit: 'ml/saat', def: 5 },
      { id: 'V',  label: 'Toplam verilecek hacim (strok için, ops.)', sub: 'V', unit: 'ml', def: 10 },
      { id: 'n',  label: 'Seçtiğin motor devri', sub: 'n', unit: 'd/dak', def: 30 },
      { id: 'ds', label: 'Şırınga iç çapı', sub: 'ds · yaygın: 5ml≈12 · 10ml≈15 · 20ml≈19 · 50ml≈27 mm', unit: 'mm', def: 15 },
      { id: 'Ph', label: 'Vida hatvesi', sub: 'Ph', unit: 'mm/dev', def: 1 },
      { id: 'z1', label: 'Temel pinyon diş sayısı', sub: 'z₁', unit: 'adet', def: 20 },
    ],
    compute: (v) => {
      const A = PI / 4 * v.ds * v.ds;                 // şırınga kesiti mm²
      const qmlDev = A * v.Ph / 1000;                 // ml/dev
      const nScrew = v.Q / (qmlDev * 60);             // gerekli vida devri d/dak
      const i = v.n / nScrew;                          // gerekli redüksiyon
      let plan, iReal, note = '';
      if (!(i > 0)) { plan = '—'; iReal = 1; }
      else if (i < 1) { const z2 = Math.max(1, Math.round(v.z1 * i)); plan = `Hız artırımı z₁=${v.z1} → z₂=${z2} (motor hedef için yavaş)`; iReal = z2 / v.z1; }
      else if (i <= 8) { const z2 = Math.round(v.z1 * i); plan = `Düz dişli çifti: z₁=${v.z1} → z₂=${z2}`; iReal = z2 / v.z1; }
      else { const zc = Math.round(i); plan = `Sonsuz vida (1 ağız) → ${zc} dişli çark`; iReal = zc; note = `Alternatif: 2 kademeli düz dişli, kademe başına ≈ ${fmt(Math.sqrt(i), 2)} : 1`; }
      const nScrewReal = v.n / iReal;
      const qReal = qmlDev * nScrewReal * 60;
      const err = v.Q > 0 ? (qReal - v.Q) / v.Q * 100 : 0;
      const vlin = v.Ph * nScrewReal;
      const L = v.V > 0 ? v.V * 1000 / A : null;
      const T = (v.V > 0 && qReal > 0) ? v.V / qReal : null;   // saat
      const rows = [
        { label: 'Şırınga kesit alanı', sub: 'A = π/4·ds²', val: fmt(A, 1), unit: 'mm²' },
        { label: 'Vida verimi', sub: 'A·Ph → hacim/devir', val: fmt(qmlDev, 4), unit: 'ml/dev' },
        { label: 'Gerekli vida devri', sub: 'n_vida = Q / (ml_dev · 60)', val: fmt(nScrew, 3), unit: 'd/dak' },
        { label: 'Gerekli redüksiyon oranı', sub: 'i = n_motor / n_vida', val: fmt(i, 2), unit: ': 1', hi: true },
        { label: 'Önerilen düzenek', sub: plan, val: '➜', unit: '', hi: true },
        { label: 'Gerçekleşen dozaj', sub: `seçilen dişlilerle · sapma %${fmt(err, 1)}`, val: fmt(qReal, 3), unit: 'ml/saat', hi: true },
        { label: 'Vida ilerlemesi', sub: 'v = Ph · n_vida', val: fmt(vlin, 3), unit: 'mm/dak' },
      ];
      if (L != null) rows.push({ label: 'Gerekli strok boyu', sub: `L = V·1000 / A  (V = ${fmt(v.V, 1)} ml)`, val: fmt(L, 1), unit: 'mm', hi: true });
      if (T != null) rows.push({ label: 'Boşaltma süresi', sub: 'T = V / Q', val: fmt(T, 2), unit: `saat (${fmt(T * 60, 0)} dak)` });
      if (note) rows.push({ label: 'Alternatif', sub: note, val: 'ℹ️', unit: '' });
      return {
        rows,
        formula: [
          'Q = (π/4·ds²) · Ph · n_vida / 1000 · 60      [ml/saat]',
          'i = n_motor / n_vida            (gerekli redüksiyon)',
          'z₂ = z₁ · i   ·   sonsuz vida: 1 ağız → i dişli',
          'L = V·1000 / (π/4·ds²)          (gerekli strok boyu)',
        ]
      };
    }
  },

  sema: {
    ico: '🧩', cat: 'Şema Tasarımı',
    title: 'Güç Aktarım Şeması',
    desc: 'Motor, dişli, kasnak, zincir ve vidalı mili kutular halinde ekle, oklarla birbirine bağla. ⚡ Hesapla ile tüm zincirin devrini, dönüş yönünü, torkunu, ilerlemesini ve dozajını tek seferde gör. Şeman otomatik kaydedilir.',
    custom: true,
    render: () => semaHTML(),
    init: () => sInit(),
  },

};

let active = 'home';

function buildNav() {
  const groups = {};
  for (const [key, c] of Object.entries(CALCS)) {
    (groups[c.cat] ||= []).push([key, c]);
  }
  let html = `
    <div class="nav-group">
      <div class="nav-item ${active==='home'?'active':''}" onclick="go('home')">
        <span class="ico">🏠</span> Ana Sayfa
      </div>
    </div>`;
  for (const [cat, items] of Object.entries(groups)) {
    html += `<div class="nav-group"><h2>${cat}</h2>`;
    for (const [key, c] of items) {
      html += `<div class="nav-item ${active===key?'active':''}" onclick="go('${key}')">
        <span class="ico">${c.ico}</span> ${c.title}
      </div>`;
    }
    html += `</div>`;
  }
  document.getElementById('nav').innerHTML = html;
}

function filterTiles(q) {
  q = (q || '').trim().toLowerCase();
  let shown = 0;
  document.querySelectorAll('#homeGrid .tile').forEach(t => {
    const ok = !q || t.dataset.search.includes(q);
    t.style.display = ok ? '' : 'none';
    if (ok) shown++;
  });
  document.getElementById('gridEmpty').style.display = shown ? 'none' : 'block';
}

function renderCalc(key) {
  const c = CALCS[key];
  document.getElementById('crumb').textContent = c.title;
  if (c.custom) {
    document.getElementById('content').innerHTML = `
      <div class="calc-head">
        <h2><span class="ico">${c.ico}</span> ${c.title}</h2>
        <p>${c.desc}</p>
      </div>${c.render()}`;
    if (c.init) c.init();
    return;
  }
  let fields = '';
  for (const inp of c.inputs) {
    let control;
    if (inp.type === 'select') {
      const opts = inp.options.map(o =>
        `<option value="${o.v}" ${o.v === inp.def ? 'selected' : ''}>${o.t}</option>`).join('');
      control = `<select id="in_${inp.id}" onchange="calc('${key}')">${opts}</select>`;
    } else {
      control = `<input id="in_${inp.id}" type="text" inputmode="decimal" value="${inp.def}" placeholder="0" oninput="calc('${key}')" />
        <span class="unit">${inp.unit}</span>`;
    }
    fields += `<div class="field">
      <label>${inp.label} <span class="hint">(${inp.sub})</span></label>
      <div class="input-wrap">${control}</div>
    </div>`;
  }
  const topic = c.notes ? `
    <details class="topic">
      <summary>📚 Konu Özeti — sınavdan önce 1 dakikada oku</summary>
      <div class="topic-body">${c.notes}</div>
    </details>` : '';
  document.getElementById('content').innerHTML = `
    <div class="calc-head">
      <h2><span class="ico">${c.ico}</span> ${c.title}</h2>
      <p>${c.desc}</p>
    </div>
    ${topic}
    <div class="panels">
      <div class="card">
        <h3><span class="dot"></span> Girdiler</h3>
        ${fields}
        <div class="btn-row">
          <button class="btn btn-primary" onclick="calc('${key}')">⚡ Hesapla</button>
          <button class="btn btn-ghost" onclick="renderCalc('${key}')">Sıfırla</button>
        </div>
        ${c.action ? `<button class="btn btn-primary" style="width:100%; margin-top:10px; background:linear-gradient(135deg,#10b981,#0ea5e9);" onclick="${c.action.fn}()">${c.action.label}</button>` : ''}
      </div>
      <div class="card results" id="results">
        <h3><span class="dot"></span> Sonuçlar</h3>
        <div id="resBody"><div class="empty">Değerleri girip <b>Hesapla</b>’ya bas.<br>Sonuçlar burada görünecek. 👇</div></div>
      </div>
    </div>`;
  calc(key);
}

function calc(key) {
  const c = CALCS[key];
  const v = {};
  for (const inp of c.inputs) {
    const raw = document.getElementById('in_' + inp.id).value;
    v[inp.id] = raw === '' ? '' : parseFloat(String(raw).replace(',', '.'));
  }
  const body = document.getElementById('resBody');
  try {
    const out = c.compute(v);
    let html = '';
    for (const r of out.rows) {
      html += `<div class="result-row ${r.hi ? 'highlight' : ''}">
        <div class="r-label">${r.label}<small>${r.sub}</small></div>
        <div class="r-val">${r.val}<span>${r.unit}</span></div>
      </div>`;
    }
    if (out.formula) {
      html += `<div class="formula-box"><div class="ftitle">Kullanılan Formüller</div>${out.formula.join('<br>')}</div>`;
    }
    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = `<div class="err">⚠️ Hesaplama yapılamadı. Lütfen tüm değerleri kontrol et.</div>`;
  }
}

function go(key) {
  active = key;
  buildNav();
  if (key === 'home') renderHome(); else renderCalc(key);
  document.getElementById('sidebar').classList.remove('open');
  const ph = document.getElementById('phPage');
  if (ph) {
    const t = (key !== 'home' && CALCS[key]) ? CALCS[key].title : 'Ana Sayfa';
    ph.textContent = t + ' · ' + new Date().toLocaleDateString('tr-TR');
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleTheme() {
  const b = document.body;
  const dark = b.getAttribute('data-theme') === 'dark';
  b.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = dark ? '🌙' : '☀️';
  document.getElementById('themeTxt').textContent = dark ? 'Karanlık' : 'Aydınlık';
}

function enterApp() {
  document.getElementById('intro').classList.add('hide');
  try { localStorage.setItem('mh_seen', '1'); } catch (_) {}
  setTimeout(() => { if (window.MH3D) MH3D.introStop(); }, 700);
}

/* ---- Ana sayfa kartlarında 3D eğilme (tilt) efekti ---- */
document.addEventListener('pointermove', (e) => {
  const t = e.target && e.target.closest ? e.target.closest('.tile') : null;
  document.querySelectorAll('.tile.tilted').forEach(o => {
    if (o !== t) { o.style.transform = ''; o.classList.remove('tilted'); }
  });
  if (!t || e.pointerType === 'touch') return;
  const r = t.getBoundingClientRect();
  const px = (e.clientX - r.left) / r.width - .5;
  const py = (e.clientY - r.top) / r.height - .5;
  t.style.transform = `perspective(700px) rotateX(${(-py * 8).toFixed(2)}deg) rotateY(${(px * 10).toFixed(2)}deg) translateY(-4px)`;
  t.classList.add('tilted');
});
document.addEventListener('pointerleave', () => {

/* =======================  SINAV MODU  =======================
   Mevcut CALCS hesaplarından rastgele değerlerle soru üretir,
   cevabı %2 toleransla kontrol eder, çözümü adım adım gösterir. */
const QUIZ_POOL = ['kayis', 'disli', 'zincir', 'yay', 'helisel', 'yatak', 'civata', 'kama', 'percin', 'asansor'];
let qCur = null;
let qScore = { ok: 0, total: 0 };
try { qScore = JSON.parse(localStorage.getItem('mh_quiz')) || qScore; } catch (_) {}

function qNice(v) {
  if (v >= 200) return Math.round(v / 10) * 10;
  if (v >= 50)  return Math.round(v / 5) * 5;
  if (v >= 20)  return Math.round(v);
  if (v >= 2)   return Math.round(v * 2) / 2;
  return Math.round(v * 100) / 100;
}
function qParseNum(s) {
  // fmt() çıktısını (tr-TR: binlik '.', ondalık ',') sayıya çevirir
  const x = parseFloat(String(s).replace(/\./g, '').replace(',', '.'));
  return Number.isFinite(x) ? x : NaN;
}

function quizHTML() {
  const pct = qScore.total ? Math.round(qScore.ok / qScore.total * 100) + '%' : '—';
  return `
  <div class="card">
    <div class="quiz-score">
      <span class="pill">✅ Doğru: <b id="qOk">${qScore.ok}</b></span>
      <span class="pill">📝 Toplam: <b id="qTot">${qScore.total}</b></span>
      <span class="pill">🎯 Başarı: <b id="qPct">${pct}</b></span>
      <button class="btn btn-primary" style="flex:0 0 auto; padding:10px 18px;" onclick="qNew()">🎲 Yeni Soru</button>
    </div>
    <div id="qBody"></div>
  </div>`;
}
function quizInit() { qNew(); }

function qNew(depth = 0) {
  const key = QUIZ_POOL[Math.floor(Math.random() * QUIZ_POOL.length)];
  const c = CALCS[key];
  const v = {}, given = [];
  for (const inp of c.inputs) {
    if (inp.type === 'select') {
      const opt = inp.options[Math.floor(Math.random() * inp.options.length)];
      v[inp.id] = opt.v;
      given.push({ label: inp.label, val: opt.t, unit: '' });
    } else if (inp.def === '') {
      v[inp.id] = '';
    } else {
      let x = qNice(inp.def * (0.55 + Math.random() * 1.2));
      if (/adet|kişi/.test(inp.unit)) x = Math.max(1, Math.round(x));
      if (!(x > 0)) x = inp.def;
      v[inp.id] = x;
      given.push({ label: inp.label, sub: inp.sub, val: fmt(x, 3), unit: inp.unit });
    }
  }
  let out;
  try { out = c.compute(v); } catch (e) { return depth < 6 ? qNew(depth + 1) : null; }
  const parsable = out.rows.filter(r => Number.isFinite(qParseNum(r.val)));
  if (!parsable.length) return depth < 6 ? qNew(depth + 1) : null;
  const his = parsable.filter(r => r.hi);
  const pool = his.length ? his : parsable;
  const target = pool[Math.floor(Math.random() * pool.length)];
  qCur = { key, c, given, out, target, t: qParseNum(target.val), done: false };
  qRender();
}

function qRender() {
  const q = qCur, body = document.getElementById('qBody');
  if (!q || !body) return;
  const givenHTML = q.given.map(g =>
    `<div class="qg"><small>${g.label}${g.sub ? ' (' + g.sub + ')' : ''}</small><span>${g.val} <i>${g.unit}</i></span></div>`).join('');
  body.innerHTML = `
    <div class="quiz-q">${q.c.ico} <b>${q.c.title}</b> — Aşağıdaki değerlere göre <b>${q.target.label.toLowerCase()}</b> kaçtır?${q.target.unit ? ` <span style="opacity:.75">(${q.target.unit} cinsinden)</span>` : ''}</div>
    <div class="quiz-given">${givenHTML}</div>
    <div class="quiz-answer">
      <input type="text" inputmode="decimal" id="qAns" placeholder="cevabın…" onkeydown="if(event.key==='Enter')qCheck()" />
      <span class="unit">${q.target.unit}</span>
      <button class="btn btn-primary" style="flex:0 0 auto; padding:12px 18px;" onclick="qCheck()">✓ Kontrol Et</button>
      <button class="btn btn-ghost" onclick="qReveal(true)">💡 Çözümü Göster</button>
    </div>
    <div class="quiz-fb" id="qFb"></div>
    <div id="qSol" style="display:none;"></div>`;
  const a = document.getElementById('qAns'); if (a) a.focus();
}

function qCheck() {
  const q = qCur;
  if (!q || q.done) return;
  const fb = document.getElementById('qFb');
  const ans = parseFloat((document.getElementById('qAns').value || '').trim().replace(',', '.'));
  if (!Number.isFinite(ans)) { fb.textContent = 'Önce bir değer yaz.'; fb.className = 'quiz-fb no'; return; }
  q.done = true;
  qScore.total++;
  const tol = Math.max(Math.abs(q.t) * 0.02, 0.01);   // %2 tolerans (yuvarlama payı)
  if (Math.abs(ans - q.t) <= tol) {
    qScore.ok++;
    fb.textContent = '✓ Doğru! Helal sana 👏';
    fb.className = 'quiz-fb ok';
  } else {
    fb.textContent = `✗ Olmadı. Doğru cevap: ${q.target.val} ${q.target.unit}`;
    fb.className = 'quiz-fb no';
  }
  qSave();
  qShowSolution();
}

function qReveal(manual) {
  const q = qCur; if (!q) return;
  if (manual && !q.done) {
    q.done = true; qScore.total++; qSave();
    const fb = document.getElementById('qFb');
    fb.textContent = `Doğru cevap: ${q.target.val} ${q.target.unit}`;
    fb.className = 'quiz-fb';
  }
  qShowSolution();
}

function qShowSolution() {
  const q = qCur, sol = document.getElementById('qSol');
  if (!q || !sol) return;
  let html = '<h3 style="font-size:14px; margin:16px 0 4px; display:flex; align-items:center; gap:8px;"><span class="dot" style="width:8px;height:8px;border-radius:50%;background:var(--primary);"></span> Adım Adım Çözüm</h3>';
  for (const r of q.out.rows) {
    html += `<div class="result-row ${r.hi ? 'highlight' : ''}">
      <div class="r-label">${r.label}<small>${r.sub}</small></div>
      <div class="r-val">${r.val}<span>${r.unit}</span></div>
    </div>`;
  }
  if (q.out.formula) {
    html += `<div class="formula-box"><div class="ftitle">Kullanılan Formüller</div>${q.out.formula.join('<br>')}</div>`;
  }
  sol.innerHTML = html;
  sol.style.display = 'block';
}

function qSave() {
  try { localStorage.setItem('mh_quiz', JSON.stringify(qScore)); } catch (_) {}
  const ok = document.getElementById('qOk'), tot = document.getElementById('qTot'), pct = document.getElementById('qPct');
  if (ok) ok.textContent = qScore.ok;
  if (tot) tot.textContent = qScore.total;
  if (pct) pct.textContent = qScore.total ? Math.round(qScore.ok / qScore.total * 100) + '%' : '—';
}

/* =======================  KUMPAS SİMÜLASYONU  ======================= */
let kStep = 0.05;        // hassasiyet (mm)
let kL = 24.55;          // ölçülen uzunluk (mm)
let kMode = 'free';      // 'free' | 'practice'
let kRevealed = true;    // alıştırmada cevap açıldı mı
let kDrag = false, kDownOffset = 0;
const kOX = 70, kPX = 5, kYM = 120;   // origin x, px/mm, ana cetvel y

function kCfg() {
  if (kStep === 0.1)  return { N: 10, span: 9 };
  if (kStep === 0.02) return { N: 50, span: 49 };
  return { N: 20, span: 19 };           // 0.05
}
const kMaxMM = Math.floor((960 - kOX) / kPX);
function kMaxL() { return kMaxMM - kCfg().span - 2; }
function kDec() { return kStep === 0.1 ? 1 : 2; }
function kFmt(x) { return x.toFixed(kDec()).replace('.', ','); }
function kSnap(v) { return parseFloat((Math.round(v / kStep) * kStep).toFixed(4)); }
function kClamp(v) { return Math.max(0, Math.min(kMaxL(), v)); }

function kReading() {
  const main = Math.floor(kL + 1e-7);
  const frac = kL - main;
  const jAlign = Math.round(frac / kStep);
  const vern = parseFloat((jAlign * kStep).toFixed(4));
  return { main, jAlign, vern, total: parseFloat((main + vern).toFixed(4)) };
}

function kumpasHTML() {
  return `
  <div class="card">
    <div class="k-wrap">
      <div class="k-controls">
        <div class="k-seg" id="kStepSeg">
          <button data-step="0.1">0,1 mm</button>
          <button data-step="0.05">0,05 mm</button>
          <button data-step="0.02">0,02 mm</button>
        </div>
        <div class="k-seg" id="kModeSeg">
          <button data-mode="free">🎮 Serbest</button>
          <button data-mode="practice">🎯 Alıştırma</button>
        </div>
        <button class="btn btn-ghost" id="kRandomBtn" style="display:none; flex:0 0 auto; padding:10px 16px;">🎲 Yeni Ölçü</button>
      </div>

      <div class="k-readout">
        <span class="lbl">Ölçülen değer:</span>
        <span class="big" id="kBig">0,00</span>
        <span class="lbl">mm</span>
      </div>

      <div class="k-svg-box" id="kSvgBox"></div>

      <input type="range" class="k-range" id="kRange" />

      <div id="kPractice" style="display:none;">
        <div class="k-answer">
          <span class="lbl">Okuduğun değeri yaz:</span>
          <input type="text" inputmode="decimal" id="kAns" placeholder="örn. 24,55" />
          <button class="btn btn-primary" style="flex:0 0 auto; padding:11px 18px;" id="kCheckBtn">✓ Kontrol Et</button>
        </div>
        <div class="k-feedback" id="kFb"></div>
      </div>

      <div class="k-break" id="kBreak"></div>
      <div class="k-hint">💡 İpucu: Verniyer (alt) çizgilerinden hangisi üst ana cetvel çizgisiyle <b>tam üst üste</b> geliyorsa, o çizginin değeri ölçünün ondalık kısmıdır. Kumpası fareyle/parmağınla sürükle ya da alttaki çubuğu kaydır.</div>
    </div>
  </div>`;
}

function kInit() {
  // segment butonları
  document.querySelectorAll('#kStepSeg button').forEach(b => {
    b.onclick = () => kSetStep(parseFloat(b.dataset.step));
  });
  document.querySelectorAll('#kModeSeg button').forEach(b => {
    b.onclick = () => kSetMode(b.dataset.mode);
  });
  document.getElementById('kRandomBtn').onclick = kNewRandom;
  document.getElementById('kCheckBtn').onclick = kCheck;
  const r = document.getElementById('kRange');
  r.oninput = () => kSetL(parseFloat(r.value), true);
  // sürükleme (fare + dokunmatik)
  const box = document.getElementById('kSvgBox');
  box.addEventListener('pointerdown', (e) => {
    if (kMode !== 'free') return;
    kDrag = true; kDownOffset = kPointerL(e) - kL;
    try { box.setPointerCapture(e.pointerId); } catch (_) {}
  });
  box.addEventListener('pointermove', (e) => {
    if (!kDrag) return;
    kSetL(kPointerL(e) - kDownOffset);
  });
  box.addEventListener('pointerup',   () => { kDrag = false; });
  box.addEventListener('pointercancel',() => { kDrag = false; });
  kSyncRange();
  kSetStepUI(); kSetModeUI();
  kDraw();
}

function kPointerL(e) {
  const svg = document.querySelector('#kSvgBox svg');
  const r = svg.getBoundingClientRect();
  const sx = (e.clientX - r.left) * (1000 / r.width);
  return (sx - kOX) / kPX;
}
function kSetL(v, fromRange) {
  kL = kClamp(kSnap(v));
  if (!fromRange) { const r = document.getElementById('kRange'); if (r) r.value = kL; }
  kDraw();
}
function kSyncRange() {
  const r = document.getElementById('kRange');
  r.min = 0; r.max = kMaxL(); r.step = kStep; r.value = kL;
}
function kSetStep(s) {
  kStep = s; kL = kClamp(kSnap(kL)); kSyncRange(); kSetStepUI();
  if (kMode === 'practice') kNewRandom(); else kDraw();
}
function kSetStepUI() {
  document.querySelectorAll('#kStepSeg button').forEach(b =>
    b.classList.toggle('on', parseFloat(b.dataset.step) === kStep));
}
function kSetMode(m) {
  kMode = m; kSetModeUI();
  const practice = m === 'practice';
  document.getElementById('kRandomBtn').style.display = practice ? 'flex' : 'none';
  document.getElementById('kPractice').style.display = practice ? 'block' : 'none';
  document.getElementById('kRange').style.display = practice ? 'none' : 'block';
  if (practice) kNewRandom();
  else { kRevealed = true; kDraw(); }
}
function kSetModeUI() {
  document.querySelectorAll('#kModeSeg button').forEach(b =>
    b.classList.toggle('on', b.dataset.mode === kMode));
}
function kNewRandom() {
  kL = kClamp(kSnap(5 + Math.random() * (kMaxL() - 8)));
  kRevealed = false;
  const a = document.getElementById('kAns'); if (a) a.value = '';
  const fb = document.getElementById('kFb'); if (fb) { fb.textContent = ''; fb.className = 'k-feedback'; }
  kDraw();
}
function kCheck() {
  const a = document.getElementById('kAns');
  const fb = document.getElementById('kFb');
  const ans = parseFloat((a.value || '').replace(',', '.'));
  if (isNaN(ans)) { fb.textContent = 'Önce bir değer yaz.'; fb.className = 'k-feedback no'; return; }
  const t = kReading().total;
  if (Math.abs(ans - t) < kStep * 0.6) {
    fb.textContent = '✓ Doğru! Aferin 👏';
    fb.className = 'k-feedback ok';
  } else {
    fb.textContent = `✗ Olmadı. Doğru değer: ${kFmt(t)} mm`;
    fb.className = 'k-feedback no';
  }
  kRevealed = true; kDraw();
}

function kDraw() {
  const { N, span } = kCfg();
  const div = span / N;                       // verniyer bölüm uzunluğu (mm)
  const rd = kReading();
  const xv0 = kOX + kL * kPX;                  // verniyer sıfırı / hareketli çene
  const guideMM = Math.round(kL + rd.jAlign * div);
  const show = (kMode === 'free' || kRevealed);
  const s = [];
  s.push(`<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" style="cursor:${kMode==='free'?'ew-resize':'default'}">`);

  // gövde (ana cetvel)
  s.push(`<rect x="20" y="55" width="945" height="65" rx="6" fill="var(--surface-2)" stroke="var(--muted)" stroke-width="1"/>`);
  // sabit çene bağlantısı + sol kol
  s.push(`<rect x="${kOX-14}" y="120" width="14" height="80" fill="var(--text-soft)" opacity="0.35"/>`);
  s.push(`<rect x="${kOX-14}" y="195" width="14" height="70" rx="3" fill="var(--text-soft)"/>`);

  // ana cetvel çizgileri (mm) + cm rakamları
  for (let mm = 0; mm <= kMaxMM; mm++) {
    const x = kOX + mm * kPX;
    const len = (mm % 10 === 0) ? 24 : (mm % 5 === 0) ? 15 : 9;
    const w = (mm % 10 === 0) ? 1.5 : 1;
    s.push(`<line x1="${x}" y1="${kYM}" x2="${x}" y2="${kYM-len}" stroke="var(--text)" stroke-width="${w}"/>`);
    if (mm % 10 === 0) s.push(`<text x="${x}" y="${kYM-30}" font-size="13" fill="var(--text)" text-anchor="middle" font-family="sans-serif" font-weight="700">${mm/10}</text>`);
  }

  // hizalama kılavuz çizgisi (kesikli)
  if (show) s.push(`<line x1="${kOX+guideMM*kPX}" y1="${kYM-26}" x2="${kOX+guideMM*kPX}" y2="${kYM+46}" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" opacity="0.8"/>`);

  // sürgü / verniyer plakası
  s.push(`<rect x="${xv0}" y="120" width="${span*kPX}" height="46" rx="5" fill="var(--primary)" fill-opacity="0.12" stroke="var(--primary)" stroke-width="1"/>`);
  // hareketli çene
  s.push(`<rect x="${xv0}" y="120" width="14" height="80" fill="var(--primary)" opacity="0.25"/>`);
  s.push(`<rect x="${xv0}" y="195" width="14" height="70" rx="3" fill="var(--text-soft)"/>`);

  // verniyer çizgileri
  for (let j = 0; j <= N; j++) {
    const x = kOX + (kL + j * div) * kPX;
    const len = (j % 5 === 0) ? 22 : 13;
    const on = (j === rd.jAlign && show);
    s.push(`<line x1="${x}" y1="${kYM}" x2="${x}" y2="${kYM+len}" stroke="${on?'#ef4444':'var(--primary)'}" stroke-width="${on?2.6:1.2}"/>`);
    if (j % 5 === 0) s.push(`<text x="${x}" y="${kYM+34}" font-size="11" fill="${on?'#ef4444':'var(--text-soft)'}" text-anchor="middle" font-family="sans-serif" font-weight="${on?'700':'500'}">${kFmt(j*kStep)}</text>`);
  }
  // verniyer "0" oku
  s.push(`<text x="${xv0}" y="${kYM+50}" font-size="11" fill="var(--primary)" text-anchor="middle" font-weight="700">▲</text>`);

  // ölçülen parça
  if (kL > 0.001) {
    s.push(`<rect x="${kOX}" y="213" width="${kL*kPX}" height="40" rx="3" fill="var(--accent)" fill-opacity="0.28" stroke="var(--accent)" stroke-width="1.5"/>`);
    const cx = kOX + kL*kPX/2;
    s.push(`<text x="${cx}" y="237" font-size="13" fill="var(--text)" text-anchor="middle" font-weight="700">${show ? kFmt(kL)+' mm' : '?'}</text>`);
  }

  s.push(`</svg>`);
  document.getElementById('kSvgBox').innerHTML = s.join('');

  // okuma kutusu + dökümü
  const big = document.getElementById('kBig');
  if (show) { big.textContent = kFmt(rd.total); big.classList.remove('hidden'); }
  else { big.textContent = '? ?'; big.classList.add('hidden'); }

  const brk = document.getElementById('kBreak');
  if (show) {
    brk.innerHTML = `<b>Okuma:</b> Ana cetvel <b>${rd.main}</b> mm &nbsp;+&nbsp; Verniyer <b>${rd.jAlign}</b> × ${kFmt(kStep)} = <b>${kFmt(rd.vern)}</b> mm &nbsp;<b>=&nbsp; ${kFmt(rd.total)} mm</b>`;
  } else {
    brk.innerHTML = `🎯 Çeneler arasındaki parçanın ölçüsünü cetvelden oku ve yukarıdaki kutuya yaz, sonra <b>Kontrol Et</b>’e bas.`;
  }
}

function cetvelDrawCal() {
  const shape = document.getElementById('cCalShape');
  if (cRefKey === 'coin') { shape.className = 'cet-shape-coin'; shape.style.width = cBarPx + 'px'; shape.style.height = cBarPx + 'px'; }
  else { shape.className = 'cet-shape-card'; shape.style.width = cBarPx + 'px'; shape.style.height = (cBarPx * 53.98 / 85.6) + 'px'; }
  const ppmm = cBarPx / cRefMM;
  document.getElementById('cScaleRead').innerHTML = `1 mm = <b>${ppmm.toFixed(2)}</b> px&nbsp; ·&nbsp; 1 cm ≈ <b>${(ppmm * 10).toFixed(0)}</b> px`;
}

function cetvelSaveCal() {
  cPPMM = cBarPx / cRefMM;
  try { localStorage.setItem('mh_ppmm', String(cPPMM)); } catch (_) {}
  cX1 = 0; cX2 = 0;
  cetvelShowMeasure();
}
function cetvelShowCal() {
  document.getElementById('calSection').style.display = 'block';
  document.getElementById('measSection').style.display = 'none';
  cetvelDrawCal();
}
function cetvelRecal() { cetvelShowCal(); }

function cetvelShowMeasure() {
  document.getElementById('calSection').style.display = 'none';
  document.getElementById('measSection').style.display = 'block';
  requestAnimationFrame(() => {
    const w = document.getElementById('cStrip').clientWidth;
    cetvelBuildRuler(w);
    if (!cX1 && !cX2) { cX1 = Math.round(10 * cPPMM); cX2 = Math.round(Math.min(w - 8, 10 * cPPMM + 30 * cPPMM)); }
    cetvelUpdate();
  });
}

function cetvelBuildRuler(w) {
  const mmMax = Math.floor(w / cPPMM);
  let h = '';
  for (let mm = 0; mm <= mmMax; mm++) {
    const x = mm * cPPMM;
    const len = (mm % 10 === 0) ? 20 : (mm % 5 === 0) ? 13 : 7;
    h += `<div class="cet-tick" style="left:${x}px;height:${len}px"></div>`;
    if (mm % 10 === 0) h += `<div class="cet-num" style="left:${x}px">${mm / 10}</div>`;
  }
  document.getElementById('cRuler').innerHTML = h;
}

function cetvelUpdate() {
  const strip = document.getElementById('cStrip'); if (!strip) return;
  const w = strip.clientWidth;
  cX1 = Math.max(0, Math.min(w, cX1)); cX2 = Math.max(0, Math.min(w, cX2));
  document.getElementById('cH1').style.left = cX1 + 'px';
  document.getElementById('cH2').style.left = cX2 + 'px';
  const lo = Math.min(cX1, cX2), hi = Math.max(cX1, cX2);
  const reg = document.getElementById('cRegion'); reg.style.left = lo + 'px'; reg.style.width = (hi - lo) + 'px';
  const mm = (hi - lo) / cPPMM;
  document.getElementById('cMeasVal').textContent = mm.toFixed(1).replace('.', ',');
  document.getElementById('cMeasCm').textContent = '(' + (mm / 10).toFixed(2).replace('.', ',') + ' cm)';
}

function cetvelBindHandles() {
  [['cH1', 1], ['cH2', 2]].forEach(([id, which]) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => { cDragH = which; try { el.setPointerCapture(e.pointerId); } catch (_) {} e.preventDefault(); });
    el.addEventListener('pointermove', (e) => {
      if (cDragH !== which) return;
      const r = document.getElementById('cStrip').getBoundingClientRect();
      if (which === 1) cX1 = e.clientX - r.left; else cX2 = e.clientX - r.left;
      cetvelUpdate();
    });
    el.addEventListener('pointerup', () => { cDragH = null; });
    el.addEventListener('pointercancel', () => { cDragH = null; });
  });
}

let sN = [], sE = [], sNext = 1, sMode = 'move', sLinkSrc = null, sSelEdge = null;

function sNum(x) { const f = parseFloat(String(x == null ? '' : x).replace(',', '.')); return isNaN(f) ? null : f; }
function sLabel(n) {
  const t = S_TYPES[n.type];
  if (n.type === 'motor' && n.params.ad) return t.ico + ' ' + n.params.ad;
  return t.ico + ' ' + t.name + ' #' + n.id;
}
function sSave() {
  try { localStorage.setItem('mh_sema', JSON.stringify({ n: sN, e: sE, x: sNext })); } catch (_) {}
}
function sLoad() {
  try {
    const raw = localStorage.getItem('mh_sema');
    if (!raw) return;
    const o = JSON.parse(raw);
    if (o && Array.isArray(o.n)) { sN = o.n; sE = o.e || []; sNext = o.x || (sN.length + 1); }
  } catch (_) {}
}

function sInit() {
  sLoad();
  document.querySelectorAll('#sModeSeg button').forEach(b => {
    b.onclick = () => { sMode = b.dataset.m; sLinkSrc = null; sModeUI(); sRenderAll(); };
  });

  canvas.addEventListener('pointerdown', (e) => {
    const t = e.target;
    if (t.id === 'sInner' || t.id === 'sCanvas' || t.id === 'sSvg' || t.tagName === 'svg') {
      sHideMenu();
      if (sLinkSrc !== null) { sLinkSrc = null; sRenderAll(); }

function sModeUI() {
  document.querySelectorAll('#sModeSeg button').forEach(b =>
    b.classList.toggle('on', b.dataset.m === sMode));

function sAdd(type) {
  const i = sN.length;
  sN.push({ id: sNext++, type, x: 40 + (i % 5) * 230, y: 40 + Math.floor(i / 5) * 190, params: Object.fromEntries(S_TYPES[type].params.map(p => [p.id, p.def])) });
  sSave(); sRenderAll();
}
function sDel(id) {
  sN = sN.filter(n => n.id !== id);
  sE = sE.filter(e => e.from !== id && e.to !== id);
  sHideMenu(); sSave(); sRenderAll();
}
function sClear() {
  if (!sN.length || confirm('Tüm şema silinsin mi?')) {
    sN = []; sE = []; sNext = 1; sLinkSrc = null; sHideMenu(); sSave(); sRenderAll();
    const sum = document.getElementById('sSummary');
    if (sum) sum.innerHTML = '<div class="empty">Şemayı kur ve <b>⚡ Hesapla</b>\'ya bas. 👇</div>';
