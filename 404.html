<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sayfa Bulunamadı · MakineHesap</title>
<meta name="robots" content="noindex" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #191d36;
    color: #e9ecf9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  .wrap {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .code {
    font-size: clamp(64px, 18vw, 140px);
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 0;
    line-height: 1;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 12px 0 8px;
    color: #ffffff;
  }
  p {
    font-size: 15px;
    color: #b7bce0;
    max-width: 420px;
    margin: 0 0 28px;
    line-height: 1.6;
  }
  a.btn {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 999px;
    background: #7c3aed;
    color: #ffffff;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  a.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(124, 58, 237, 0.45);
  }
</style>
</head>
<body>
  <div class="wrap">
    <p class="code">404</p>
    <h1>Sayfa bulunamadı</h1>
    <p>Aradığınız sayfa taşınmış, kaldırılmış ya da hiç var olmamış olabilir. Hesaplama ve tasarım araçlarına ana sayfadan ulaşabilirsiniz.</p>
    <a class="btn" href="https://gdntsrm.com/">Ana sayfaya dön</a>
  </div>
</body>
</html>
